<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake & Pitfall — Display</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    #audienceLog {
  display: block;
  width: min(60vh, 55vw);
  margin: 20px auto 30px auto;
  padding: 12px 16px;
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
  border: 2px solid rgba(255,215,0,0.25);
  max-height: 200px;
  overflow-y: auto;
  font-size: 0.95em;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  position: relative;
  z-index: 5;
}
#audienceLog.hidden { display: none; }

/* === Dark themed scrollbar (Chrome / Edge / Safari) === */
#audienceLog::-webkit-scrollbar {
  width: 10px;
}
#audienceLog::-webkit-scrollbar-track {
  background: rgba(0, 0, 0, 0.4);
  border-radius: 8px;
  margin: 4px 0;
}
#audienceLog::-webkit-scrollbar-thumb {
  background: rgba(255, 215, 0, 0.35);
  border-radius: 8px;
  border: 2px solid rgba(0, 0, 0, 0.3);
}
#audienceLog::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 215, 0, 0.55);
}
/* === Firefox === */
#audienceLog {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 215, 0, 0.4) rgba(0, 0, 0, 0.4);
}
#audienceLog .log-title {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 0.95em;
  font-weight: bold;
  color: #ffd700;
  text-align: center;
  margin-bottom: 6px;
  opacity: 0.85;
}
#audienceLog .empty {
  text-align: center;
  opacity: 0.5;
  font-style: italic;
}
.alog-entry {
  padding: 7px 12px;
  margin-bottom: 5px;
  border-radius: 6px;
  border-left: 4px solid #4a90e2;
  background: rgba(74,144,226,0.15);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1em;
}
.alog-entry .alog-text { line-height: 1.4; }
.alog-entry.team-b {
  border-left-color: #e74c3c;
  background: rgba(231,76,60,0.12);
}
.alog-entry.undone {
  opacity: 0.35;
  text-decoration: line-through;
}    
.alog-piece {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.55em;
  height: 1.55em;
  border-radius: 50%;
  color: white;
  font-weight: 900;
  font-size: 0.85em;
  border: 1.5px solid white;
  flex-shrink: 0;
  text-shadow: 0 1px 1px rgba(0,0,0,0.6);
}
.alog-piece.team-a { background: #4a90e2; }
.alog-piece.team-b { background: #e74c3c; }
.alog-text { flex: 1; }
    /* Subtle background poster during play */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('poster.png') center/cover no-repeat;
      opacity: 0;
      filter: blur(8px) brightness(0.4);
      z-index: -1;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    body.playing::before {
      opacity: 0.75;
    }
    .claimed-treasure {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 22px;
  height: 22px;
  z-index: 6;
  pointer-events: none;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.9));
  animation: treasurePopIn 0.5s ease;
}
.claimed-treasure + .claimed-treasure {
  right: 28px;  /* 2nd box stacks to the left of 1st */
}
.claimed-treasure svg {
  width: 100%;
  height: 100%;
  display: block;
}
@keyframes treasurePopIn {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.25) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
    /* === Animated background snakes during play === */
    #bgSnakes {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      transition: opacity 1s ease;
      overflow: hidden;
    }
    body.playing #bgSnakes { opacity: 1; }
    
    .bg-snake {
      position: absolute;
      filter: blur(8px);
      opacity: 0.35;
      animation: bgDrift 30s linear infinite, bgWiggle 4s ease-in-out infinite;
    }
    .bg-snake.green { fill: #27ae60; }
    .bg-snake.purple { fill: #9b59b6; }
    
    @keyframes bgDrift {
      0% { transform: translate(-150px, 0) rotate(0deg); }
      50% { transform: translate(50vw, 30vh) rotate(180deg); }
      100% { transform: translate(100vw, 60vh) rotate(360deg); }
    }
    @keyframes bgWiggle {
      0%, 100% { filter: blur(8px); }
      50% { filter: blur(12px); }
    }

    h1 {
      font-size: 2.3em;
      margin: 8px 0;
      text-shadow: 0 2px 10px rgba(74, 144, 226, 0.5);
    }
    #topBar {
      display: flex;
      gap: 30px;
      align-items: center;
      font-size: 1.2em;
      margin-bottom: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #status { padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    .waiting { background: #ff9800; }
    .connected { background: #4caf50; }

    /* Mute button */
    #muteBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      font-size: 1.5em;
      cursor: pointer;
      z-index: 300;
      transition: all 0.2s;
    }
    #muteBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.08); }
    #muteBtn.muted { opacity: 0.6; }

    #gameStatusBadge {
      font-size: 1.3em; font-weight: bold;
      padding: 8px 18px; border-radius: 10px;
    }
    #gameStatusBadge.hidden { display: none; }
    #gameStatusBadge.game-over { background: rgba(212, 175, 55, 0.5); border: 2px solid #d4af37; }

    /* === Welcome / Setup Splash with Poster === */
    #welcomeSplash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
      margin: 20px 0;
      text-align: center;
    }
    #welcomeSplash.hidden { display: none; }
    #posterImg {
      max-width: min(80vh, 90vw);
      max-height: 75vh;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: posterFloat 4s ease-in-out infinite;
    }
    @keyframes posterFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.01); }
    }
    .setup-overlay-text {
      font-size: 1.8em;
      padding: 18px 36px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 16px;
      border: 2px solid rgba(212, 175, 55, 0.6);
      animation: pulse 2s infinite;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

    #boardWrapper {
      position: relative;
      width: min(65vh, 88vw);
      aspect-ratio: 1 / 1;
    }
    #boardWrapper.hidden { display: none; }
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 5px;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
    }
    #board.locked { opacity: 0.85; pointer-events: none; }
    #arrowSvg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .cell {
      background: linear-gradient(145deg, #2a3568, #1e2850);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
      transition: background 0.3s;
      overflow: hidden;
      padding: 4px;
    }
    .cell.start { background: linear-gradient(145deg, #2d7a3d, #1f5a2c); }
    .cell.goal { background: linear-gradient(145deg, #d4af37, #b8941f); color: #0a0e27; }
    .cell-number {
      position: absolute;
      top: 3px; left: 5px;
      font-size: 0.85em;
      opacity: 0.7;
      z-index: 4;
    }
    .pieces {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-content: center;
  gap: 2px;
  font-size: 0.85em;
  z-index: 10;
  max-width: 92%;
  max-height: 88%;
  position: relative;
}
    .piece {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.piece-token {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.55em;
  height: 1.55em;
  border-radius: 50%;
  color: white;
  font-weight: 900;
  font-size: 0.95em;
  border: 1.5px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.6), inset 0 -1px 3px rgba(0,0,0,0.3);
  text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  flex-shrink: 0;
}

    .cell.highlight {
      background: linear-gradient(145deg, #f39c12, #d68910) !important;
      animation: flash 0.4s ease;
    }
    .cell.snake-reveal { animation: revealFlash 0.6s ease; }
    .cell.pitfall-reveal { animation: revealFlash 0.6s ease; }
    .cell.treasure-reveal-a { background: linear-gradient(145deg, #d4af37, #f1c40f) !important; animation: revealFlash 0.6s ease; }
    .cell.treasure-reveal-b { background: linear-gradient(145deg, #1abc9c, #16a085) !important; animation: revealFlash 0.6s ease; }
    .cell.conflict-reveal { background: linear-gradient(145deg, #8e44ad, #6c3483) !important; animation: revealFlash 0.6s ease; }
    @keyframes flash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes revealFlash {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); box-shadow: 0 0 30px rgba(255,255,255,0.9); }
      100% { transform: scale(1); }
    }

    .snake-body { animation: snakeWiggle 2s infinite ease-in-out; }
    @keyframes snakeWiggle { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    .snake-head { animation: headBob 1.5s infinite ease-in-out; transform-origin: center; transform-box: fill-box; }
    @keyframes headBob { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .snake-tongue { animation: tongueFlick 0.8s infinite; }
    @keyframes tongueFlick { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pit-hole { animation: pitPulse 2s infinite ease-in-out; }
    @keyframes pitPulse { 0%, 100% { opacity: 0.95; } 50% { opacity: 0.7; } }
    .fall-trajectory { animation: fallShimmer 1.5s infinite; }
    @keyframes fallShimmer { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    #gameLayout {
  display: flex;
  flex-direction: row;
  gap: 20px;
  width: 100%;
  max-width: 1600px;
  margin: 0 auto;
  align-items: center;     /* center vertically with board */
  justify-content: center;
  padding: 0 10px;
}
#gameLayout.hidden { display: none; }
#gameLayout .team-card {
  flex: 0 0 280px;
  min-width: 260px;
}
#gameLayout #boardWrapper {
  flex: 0 0 auto;
  width: min(60vh, 55vw);
}

/* Mini piece tokens in the team card pieces summary */
.mini-token {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.4em;
  height: 1.4em;
  border-radius: 50%;
  color: white;
  font-weight: 900;
  font-size: 0.78em;
  border: 1.5px solid white;
  vertical-align: middle;
  margin-right: 2px;
  text-shadow: 0 1px 1px rgba(0,0,0,0.6);
}
.mini-token.team-a { background: #4a90e2; }
.mini-token.team-b { background: #e74c3c; }

/* New "Treasure collected" line */
.treasure-collected {
  font-size: 0.95em;
  margin: 6px 0;
  color: #ffd700;
  font-weight: bold;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}

    /* === Scorecards === */
    #scorePanel {
      display: flex;
      gap: 30px;
      margin-top: 18px;
      font-size: 1.1em;
    }
    #scorePanel.hidden { display: none; }
    .team-card {
      padding: 14px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      min-width: 260px;
      text-align: center;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .team-card.active {
      background: rgba(255, 215, 0, 0.18);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }
    .team-card.winner {
      background: rgba(76, 175, 80, 0.35);
      box-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
      transform: scale(1.1);
      border-color: #4caf50;
    }
    .team-card.team-a { border-color: rgba(74, 144, 226, 0.6); }
    .team-card.team-b { border-color: rgba(231, 76, 60, 0.6); }
    .team-card .team-name {
      font-size: 1.4em;
      font-weight: bold;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .team-card.team-a .team-name { color: #4a90e2; text-shadow: 0 0 8px rgba(74,144,226,0.4); }
    .team-card.team-b .team-name { color: #e74c3c; text-shadow: 0 0 8px rgba(231,76,60,0.4); }
    .piece-positions { font-size: 0.95em; margin-bottom: 4px; }
    .breakdown { font-size: 0.85em; opacity: 0.9; margin-bottom: 6px; }
    .total { font-size: 1.7em; font-weight: bold; }

    .legend-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: flex-end;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .legend-icon-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      position: relative;
    }
    .legend-icon-wrapper svg {
      width: 38px;
      height: 38px;
    }
    .legend-icon-wrapper .legend-label {
      font-size: 0.7em;
      opacity: 0.85;
    }
    /* Treasure count badge */
    .treasure-wrapper {
      position: relative;
    }
    .treasure-count-badge {
      position: absolute;
      top: -8px;
      right: -10px;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      background: #e74c3c;
      color: white;
      border: 2px solid white;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 5;
      transition: transform 0.3s;
    }
    .treasure-count-badge.zero { background: #666; border-color: rgba(255,255,255,0.4); opacity: 0.7; }
    .treasure-count-badge.pop {
      animation: badgePop 0.6s ease;
    }
    @keyframes badgePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.6); background: #ffd700; color: #1a1f3a; }
      100% { transform: scale(1); }
    }

    /* Floating +25 animation */
    .floating-points {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd700;
      font-size: 1.4em;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      pointer-events: none;
      opacity: 0;
      animation: floatUp 1.8s ease forwards;
      z-index: 100;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); }
      20% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
      80% { opacity: 1; transform: translate(-50%, -50px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -70px) scale(0.8); }
    }

    .turn-indicator-a { color: #4a90e2; text-shadow: 0 0 6px rgba(74,144,226,0.5); font-weight: bold; }
    .turn-indicator-b { color: #e74c3c; text-shadow: 0 0 6px rgba(231,76,60,0.5); font-weight: bold; }

    #bigBanner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.3em;
      background: white;
      color: #0a0e27;
      padding: 30px 60px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.4s ease;
      z-index: 200;
      text-align: center;
    }
    #bigBanner.show { transform: translate(-50%, -50%) scale(1); }
    #bigBanner.snake-a { background: #27ae60; color: white; }
    #bigBanner.snake-b { background: #9b59b6; color: white; }
    #bigBanner.pitfall-a { background: #c0392b; color: white; }
    #bigBanner.pitfall-b { background: #e67e22; color: white; }
    #bigBanner.treasure-a { background: #d4af37; color: #1a1f3a; }
    #bigBanner.treasure-b { background: #1abc9c; color: white; }
    #bigBanner.loop { background: #9b59b6; color: white; }
    #bigBanner.conflict { background: #8e44ad; color: white; }
    #bigBanner.goal { background: #f39c12; color: white; }
    #bigBanner.gameover { background: #d4af37; color: #1a1f3a; font-size: 3.5em; }
    #bigBanner.winner {
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      color: #1a1f3a;
      font-size: 3.2em;
    }

    #diceDisplay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 7em;
      background: white;
      color: #0a0e27;
      width: 180px; height: 180px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #diceDisplay.show { transform: translate(-50%, -50%) scale(1); }

    /* Game Over splash */
    #gameOverSplash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 250;
      gap: 30px;
    }
    #gameOverSplash.show { display: flex; }
    #gameOverSplash img {
      max-height: 50vh;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(255,215,0,0.4);
    }
    #gameOverSplash .winner-text {
      font-size: 3em;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1f3a;
      padding: 20px 50px;
      border-radius: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
    <!-- Animated background snakes -->
  <div id="bgSnakes">
    <svg class="bg-snake green" style="top:5%; left:-10%; width:280px; animation-delay: 0s, 0s;" viewBox="0 0 200 80">
      <path d="M 10 40 Q 50 10, 90 40 T 170 40 Q 185 50, 190 40" stroke-width="0" />
      <path d="M 10 40 Q 50 10, 90 40 T 170 40" fill="none" stroke="#27ae60" stroke-width="18" stroke-linecap="round"/>
    </svg>
    <svg class="bg-snake purple" style="top:60%; left:-10%; width:240px; animation-delay: -7s, -1s;" viewBox="0 0 200 80">
      <path d="M 10 40 Q 50 10, 90 40 T 170 40" fill="none" stroke="#9b59b6" stroke-width="18" stroke-linecap="round"/>
    </svg>
    <svg class="bg-snake green" style="top:30%; left:-10%; width:200px; animation-delay: -15s, -2s; opacity: 0.25;" viewBox="0 0 200 80">
      <path d="M 10 40 Q 50 60, 90 40 T 170 40" fill="none" stroke="#27ae60" stroke-width="16" stroke-linecap="round"/>
    </svg>
    <svg class="bg-snake purple" style="top:80%; left:-10%; width:320px; animation-delay: -22s, -3s; opacity: 0.3;" viewBox="0 0 200 80">
      <path d="M 10 40 Q 50 20, 90 40 T 170 40" fill="none" stroke="#9b59b6" stroke-width="20" stroke-linecap="round"/>
    </svg>
    <svg class="bg-snake green" style="top:45%; left:-10%; width:180px; animation-delay: -10s, -1.5s; opacity: 0.2;" viewBox="0 0 200 80">
      <path d="M 10 40 Q 50 65, 90 40 T 170 40" fill="none" stroke="#52d685" stroke-width="14" stroke-linecap="round"/>
    </svg>
  </div>
  <button id="muteBtn" onclick="toggleMute()" title="Mute / Unmute">🔊</button>

  <h1>🎲 Snake & Pitfall</h1>
  <div id="topBar">
    <div>Turn: <span id="turnIndicator" class="turn-indicator-a">🔵 Team A</span></div>
    <div id="gameStatusBadge" class="hidden"></div>
    <div id="status" class="waiting">⏳ Waiting for GM...</div>
  </div>

  <!-- Welcome / Setup splash with poster -->

    function getCellNumberAt(visualRow, visualCol) {
      const rowFromBottom = 4 - visualRow;
      const rowStart = rowFromBottom * 5 + 1;
      if (rowFromBottom % 2 === 0) return rowStart + visualCol;
      return rowStart + (4 - visualCol);
    }
    function getCellCoords(cellNum) {
      const rowFromBottom = Math.floor((cellNum - 1) / 5);
      const visualRow = 4 - rowFromBottom;
      const posInRow = (cellNum - 1) % 5;
      const visualCol = (rowFromBottom % 2 === 0) ? posInRow : 4 - posInRow;
      return { visualRow, visualCol };
    }
    function getCellCenter(cellNum) {
      const { visualRow, visualCol } = getCellCoords(cellNum);
      const cellSize = 1000 / 5;
      return { x: visualCol * cellSize + cellSize / 2, y: visualRow * cellSize + cellSize / 2 };
    }
    function getEdgePoint(fromCell, toCell, edgeBias = 0.35) {
      const from = getCellCenter(fromCell);
      const to = getCellCenter(toCell);
      return {
        x: from.x + (to.x - from.x) * edgeBias,
        y: from.y + (to.y - from.y) * edgeBias
      };
    }

    const board = document.getElementById('board');
const cellElements = {};
for (let r = 0; r < 5; r++) {
  for (let c = 0; c < 5; c++) {
    const cellNum = getCellNumberAt(r, c);
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (cellNum === 1) cell.classList.add('start');
    if (cellNum === 25) cell.classList.add('goal');
    cell.innerHTML =
      '<div class="cell-number">' + cellNum + '</div>' +
      '<div class="pieces" id="pieces-' + cellNum + '"></div>';
    board.appendChild(cell);
    cellElements[cellNum] = cell;
  }
}

    function addAudienceLogEntry(team, pieceIdx, fromCell, toCell, chainLog) {
  const list = document.getElementById('audienceLogList');
  if (!list) return;
  const empty = list.querySelector('.empty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'alog-entry ' + (team === 'A' ? 'team-a' : 'team-b');
  const tokenClass = team === 'A' ? 'team-a' : 'team-b';
  const label = PIECE_LABELS[team][pieceIdx];
  const teamName = state['team' + team].name;

  // Build a clean trail: fromCell → action → cell → action → cell ...
  // chainLog entries look like: '🐍4↑8', '🕳️8↓3', '💎@7', '💎×2@8', '⚖️@5', '🔄→1', '🏁'
  const parts = [String(fromCell)];
  if (chainLog && chainLog.length) {
    chainLog.forEach(function(step) {
      // Snake:  🐍4↑8  -> action '🐍↑', dest '8'
      let m = step.match(/^🐍(\d+)↑(\d+)$/);
      if (m) { parts.push('🐍↑'); parts.push(m[2]); return; }
      // Pitfall: 🕳️4↓8 -> '🕳️↓', '8'
      m = step.match(/^🕳️(\d+)↓(\d+)$/);
      if (m) { parts.push('🕳️↓'); parts.push(m[2]); return; }
      // Treasure (single): 💎@7 -> just '💎' (no new cell, stays on same cell)
      m = step.match(/^💎@(\d+)$/);
      if (m) { parts.push('💎'); return; }
      // Treasure (multi): 💎×2@7 -> '💎×2'
      m = step.match(/^💎×(\d+)@(\d+)$/);
      if (m) { parts.push('💎×' + m[1]); return; }
      // Conflict: ⚖️@7 -> '⚖️' (no movement)
      m = step.match(/^⚖️@(\d+)$/);
      if (m) { parts.push('⚖️'); return; }
      // Loop: 🔄→1 -> '🔄', '1'
      m = step.match(/^🔄→(\d+)$/);
      if (m) { parts.push('🔄'); parts.push(m[1]); return; }
      // Goal
      if (step === '🏁') { parts.push('🏁'); return; }
      // Fallback
      parts.push(step);
    });
  } else {
    // No chain events — just simple move
    parts.push(String(toCell));
  }

  // Dedup consecutive equal tokens (in case chain ended at same cell already in parts)
  const compact = [parts[0]];
  for (let i = 1; i < parts.length; i++) {
    if (parts[i] !== compact[compact.length - 1]) compact.push(parts[i]);
  }

  // Join with arrow separators
  const trail = compact.join(' → ');

  entry.innerHTML =
    '<span class="alog-piece ' + tokenClass + '">' + label + '</span>' +
    '<span class="alog-text"><strong>' + escapeHTML(teamName) + ':</strong> ' + trail + '</span>';
  list.insertBefore(entry, list.firstChild);
  list.scrollTop = 0;
}

function clearAudienceLog() {
  const list = document.getElementById('audienceLogList');
  if (list) list.innerHTML = '<div class="empty">No moves yet</div>';
}
    
    function getAllSnakesFrom(cellNum) {
  const snakes = [];
  for (const team of ['A', 'B']) {
    state.items[team].snakes.forEach(function(s) {
      if (s.from === cellNum) snakes.push(Object.assign({ team: team }, s));
    });
  }
  return snakes;
}
function findBestSnakeFrom(cellNum) {
  const all = getAllSnakesFrom(cellNum);
  if (all.length === 0) return null;
  return all.reduce(function(best, s) { return s.to > best.to ? s : best; }, all[0]);
}
function findPitfallFrom(cellNum) {
  for (const team of ['A', 'B']) {
    const f = state.items[team].pitfalls.find(function(p) { return p.from === cellNum; });
    if (f) return Object.assign({ team: team }, f);
  }
  return null;
}
function getTreasureTeamsAt(cellNum) {
  // Returns array of teams (e.g., ['A'], ['B'], or ['A','B'] if both placed treasure here)
  if (state.revealed.treasures.has(cellNum)) return [];
  const teams = [];
  for (const team of ['A', 'B']) {
    if (state.items[team].treasures.includes(cellNum)) teams.push(team);
  }
  return teams;
}

// Returns count of OWN team's treasures that have been revealed (claimed by anyone)
function getRevealedOwnTreasureCount(team) {
  let count = 0;
  state.items[team].treasures.forEach(function(cell) {
    if (state.revealed.treasures.has(cell)) count++;
  });
  return count;
}

function renderRevealedItems() {
  const svg = document.getElementById('arrowSvg');
  svg.querySelectorAll('.arrow-line').forEach(function(a) { a.remove(); });

  state.revealed.snakes.forEach(function(fromCell) {
    const snakes = getAllSnakesFrom(fromCell);
    snakes.forEach(function(s) { drawCuteSnake(fromCell, s.to, s.team); });
  });
  state.revealed.pitfalls.forEach(function(fromCell) {
    const item = findPitfallFrom(fromCell);
    if (item) drawCutePitfall(fromCell, item.to, item.team);
  });

   // Render opened-treasure-box markers on cells with claimed treasures
  for (let i = 1; i <= 25; i++) {
    const cell = cellElements[i];
    if (!cell) continue;
    // Remove any existing markers first
    cell.querySelectorAll('.claimed-treasure').forEach(function(el) { el.remove(); });
    if (state.revealed.treasures.has(i)) {
      // Count how many treasures were placed on this cell (1 or 2)
      let count = 0;
      if (state.items.A.treasures.includes(i)) count++;
      if (state.items.B.treasures.includes(i)) count++;
      for (let k = 0; k < count; k++) {
        const marker = document.createElement('div');
        marker.className = 'claimed-treasure';
        marker.innerHTML = openedChestSVG();
        cell.appendChild(marker);
      }
    }
  }
}

function drawCuteSnake(fromCell, toCell, team) {
  const colors = TEAM_COLORS[team];
  const fromEdge = getEdgePoint(fromCell, toCell, 0.32);
  const toEdge = getEdgePoint(toCell, fromCell, 0.32);
  const svg = document.getElementById('arrowSvg');
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const dx = toEdge.x - fromEdge.x;
  const dy = toEdge.y - fromEdge.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const perpX = -dy / dist;
  const perpY = dx / dist;
  const wave = Math.min(dist * 0.35, 50);
  const ctrl1X = fromEdge.x + dx * 0.3 + perpX * wave;
  const ctrl1Y = fromEdge.y + dy * 0.3 + perpY * wave;
  const ctrl2X = fromEdge.x + dx * 0.7 - perpX * wave;
  const ctrl2Y = fromEdge.y + dy * 0.7 - perpY * wave;
  const pathD = 'M ' + fromEdge.x + ' ' + fromEdge.y +
    ' C ' + ctrl1X + ' ' + ctrl1Y + ', ' + ctrl2X + ' ' + ctrl2Y +
    ', ' + toEdge.x + ' ' + toEdge.y;

  [
    { color: colors.snakeOuter, width: 22 },
    { color: colors.snakeMain, width: 16 },
    { color: colors.snakeInner, width: 7, opacity: 0.7 }
  ].forEach(function(item) {
    const p = document.createElementNS(SVG_NS, 'path');
    p.classList.add('arrow-line', 'snake-body');
    p.setAttribute('d', pathD);
    p.setAttribute('stroke', item.color);
    p.setAttribute('stroke-width', item.width);
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('fill', 'none');
    if (item.opacity) p.setAttribute('opacity', item.opacity);
    svg.appendChild(p);
  });

  const head = document.createElementNS(SVG_NS, 'circle');
  head.classList.add('arrow-line', 'snake-head');
  head.setAttribute('cx', toEdge.x); head.setAttribute('cy', toEdge.y);
  head.setAttribute('r', '20');
  head.setAttribute('fill', 'url(#' + colors.snakeHeadGrad + ')');
  head.setAttribute('stroke', colors.snakeOuter); head.setAttribute('stroke-width', '2');
  svg.appendChild(head);

  const tail = document.createElementNS(SVG_NS, 'circle');
  tail.classList.add('arrow-line');
  tail.setAttribute('cx', fromEdge.x); tail.setAttribute('cy', fromEdge.y);
  tail.setAttribute('r', '10'); tail.setAttribute('fill', colors.snakeOuter);
  svg.appendChild(tail);

  [[-7, -6], [7, -6]].forEach(function(arr) {
    const ox = arr[0], oy = arr[1];
    const eye = document.createElementNS(SVG_NS, 'circle');
    eye.classList.add('arrow-line');
    eye.setAttribute('cx', toEdge.x + ox); eye.setAttribute('cy', toEdge.y + oy);
    eye.setAttribute('r', '4'); eye.setAttribute('fill', 'white');
    svg.appendChild(eye);
    const pup = document.createElementNS(SVG_NS, 'circle');
    pup.classList.add('arrow-line');
    pup.setAttribute('cx', toEdge.x + ox + 1); pup.setAttribute('cy', toEdge.y + oy + 1);
    pup.setAttribute('r', '2'); pup.setAttribute('fill', '#000');
    svg.appendChild(pup);
  });

  const tongue = document.createElementNS(SVG_NS, 'path');
  tongue.classList.add('arrow-line', 'snake-tongue');
  const tongueD = 'M ' + toEdge.x + ' ' + (toEdge.y + 8) +
    ' L ' + toEdge.x + ' ' + (toEdge.y + 16) +
    ' M ' + toEdge.x + ' ' + (toEdge.y + 16) +
    ' L ' + (toEdge.x - 4) + ' ' + (toEdge.y + 20) +
    ' M ' + toEdge.x + ' ' + (toEdge.y + 16) +

async function diceWalk(team, pieceIdx, steps) {
  let currentPos = state['team' + team].pieces[pieceIdx];
  for (let i = 0; i < steps; i++) {
    currentPos = Math.min(currentPos + 1, 25);
    state['team' + team].pieces[pieceIdx] = currentPos;
    renderPieces();
    playSound('sndFootsteps', 0.4);
    const cell = cellElements[currentPos];
    cell.classList.add('highlight');
    await sleep(300);
    cell.classList.remove('highlight');
    if (currentPos === 25) break;
  }
  stopSound('sndFootsteps');
  return currentPos;
}

async function triggerChain(team, pieceIdx, landedCell, conn) {
  const entryCell = landedCell;
  const visitedCells = new Set([landedCell]);
  let currentCell = landedCell;
  let chainCount = 0;
  const maxChain = 12;
  const teamName = state['team' + team].name;
  const logSteps = [];   // collect movement chain for log

  function pushLog(text) { logSteps.push(text); }

  while (chainCount < maxChain) {
    chainCount++;

    const treasureTeams = getTreasureTeamsAt(currentCell);
    if (treasureTeams.length > 0) {
      state.revealed.treasures.add(currentCell);
      const points = 25 * treasureTeams.length;
      state['team' + team].treasures += treasureTeams.length;  // collector gets all
      const cell = cellElements[currentCell];
      // Use first owner's color for cell flash
      cell.classList.add('treasure-reveal-' + treasureTeams[0].toLowerCase());
      playSound('sndTreasure');
      showFloatingPoints(team, points);
      // Update badge for EACH team whose treasure was revealed
      treasureTeams.forEach(function(ownerTeam) {
        updateTreasureBadge(ownerTeam, true);
      });
      const multi = treasureTeams.length > 1 ? '×' + treasureTeams.length + ' ' : '';
      pushLog('💎' + (treasureTeams.length > 1 ? '×' + treasureTeams.length : '') + '@' + currentCell);
      await showBanner('💎 ' + multi + 'TREASURE! ' + teamName + ' +' + points + ' pts', 'treasure-' + treasureTeams[0].toLowerCase(), 1700);
      cell.classList.remove('treasure-reveal-' + treasureTeams[0].toLowerCase());
      renderRevealedItems();
      updateScores();
    }


    const snake = findBestSnakeFrom(currentCell);
    const pitfall = findPitfallFrom(currentCell);

    if (snake && pitfall) {
            state.revealed.snakes.add(currentCell);
      state.revealed.pitfalls.add(currentCell);
      ['A', 'B'].forEach(function(t) {
        if (state.items[t].snakes.some(function(s) { return s.from === currentCell; })) {
          updateSnakeBadge(t, true);
        }
        if (state.items[t].pitfalls.some(function(p) { return p.from === currentCell; })) {
          updatePitfallBadge(t, true);
        }
      });
      const cell = cellElements[currentCell];
      cell.classList.add('conflict-reveal');
      playSound('sndConflict');
      pushLog('⚖️@' + currentCell);
      await showBanner('⚖️ NEUTRALIZED at ' + currentCell + '!', 'conflict', 2000);
            cell.classList.remove('conflict-reveal');
      renderRevealedItems();
      addAudienceLogEntry(team, pieceIdx, entryCell, currentCell, logSteps);
      sendFinalPos(team, pieceIdx, currentCell, logSteps, conn, collectedTreasures);
      return;
    }

    if (snake) {
      state.revealed.snakes.add(currentCell);
            state.revealed.snakes.add(currentCell);
      // Update badges for ALL teams that have a snake at this cell
      ['A', 'B'].forEach(function(t) {
        if (state.items[t].snakes.some(function(s) { return s.from === currentCell; })) {
          updateSnakeBadge(t, true);
        }
      });
      playSound('sndSnake');
      playSound('sndSnake');
      pushLog('🐍' + currentCell + '↑' + snake.to);
      await showBanner('🐍 SNAKE! ' + currentCell + ' ↑ ' + snake.to, 'snake-' + snake.team.toLowerCase(), 1400);
      renderRevealedItems();
      state['team' + team].pieces[pieceIdx] = snake.to;
      renderPieces();
      cellElements[snake.to].classList.add('highlight');
      await sleep(500);
      cellElements[snake.to].classList.remove('highlight');
      currentCell = snake.to;

      if (visitedCells.has(currentCell)) {
        playSound('sndLoop');
        pushLog('🔄→' + entryCell);
        await showBanner('🔄 LOOP! Back to cell ' + entryCell, 'loop', 2200);
        state['team' + team].pieces[pieceIdx] = entryCell;
        renderPieces();
        cellElements[entryCell].classList.add('highlight');
        await sleep(500);
        cellElements[entryCell].classList.remove('highlight');
        addAudienceLogEntry(team, pieceIdx, entryCell, entryCell, logSteps);
        sendFinalPos(team, pieceIdx, entryCell, logSteps, conn, collectedTreasures);
        return;
      }
      visitedCells.add(currentCell);
      continue;
    }

    if (pitfall) {
      state.revealed.pitfalls.add(currentCell);
            state.revealed.pitfalls.add(currentCell);
      ['A', 'B'].forEach(function(t) {
        if (state.items[t].pitfalls.some(function(p) { return p.from === currentCell; })) {
          updatePitfallBadge(t, true);
        }
      });
      playSound('sndPitfall');
      playSound('sndPitfall');
      pushLog('🕳️' + currentCell + '↓' + pitfall.to);
      await showBanner('🕳️ PITFALL! ' + currentCell + ' ↓ ' + pitfall.to, 'pitfall-' + pitfall.team.toLowerCase(), 1400);
      renderRevealedItems();
      state['team' + team].pieces[pieceIdx] = pitfall.to;
      renderPieces();
      cellElements[pitfall.to].classList.add('highlight');
      await sleep(500);
      cellElements[pitfall.to].classList.remove('highlight');
      currentCell = pitfall.to;

      if (visitedCells.has(currentCell)) {
        playSound('sndLoop');
        pushLog('🔄→' + entryCell);
        await showBanner('🔄 LOOP! Back to cell ' + entryCell, 'loop', 2200);
        state['team' + team].pieces[pieceIdx] = entryCell;
        renderPieces();
        cellElements[entryCell].classList.add('highlight');
        await sleep(500);
        cellElements[entryCell].classList.remove('highlight');
        addAudienceLogEntry(team, pieceIdx, entryCell, entryCell, logSteps);
        sendFinalPos(team, pieceIdx, entryCell, logSteps, conn, collectedTreasures);
        return;
      }
      visitedCells.add(currentCell);
      continue;
    }

    break;
  }

    if (currentCell === 25) {
    playSound('sndGoal');
    pushLog('🏁');
    const goalLabel = (team === 'A' ? '🔵' : '🔴') + PIECE_LABELS[team][pieceIdx];
    await showBanner('🏁 ' + goalLabel + ' reached the GOAL!', 'goal', 1500);
  }
  addAudienceLogEntry(team, pieceIdx, entryCell, currentCell, logSteps);
  sendFinalPos(team, pieceIdx, currentCell, logSteps, conn);
}

function sendFinalPos(team, pieceIdx, finalCell, logSteps, conn, collectedTreasures) {
  if (conn && conn.open) {
    conn.send({
      type: 'pieceResult',
      team: team,
      pieceIdx: pieceIdx,
      finalCell: finalCell,
      chainLog: logSteps,
      collectedTreasures: collectedTreasures || []
    });
  }
}

async function handleAction(msg, conn) {
  switch (msg.type) {
    case 'movePiece':
      if (state.gameLocked) return;
      await showDice(msg.dice);
      const landedCell = await diceWalk(msg.team, msg.pieceIdx, msg.dice);
      await sleep(200);
      await triggerChain(msg.team, msg.pieceIdx, landedCell, conn);
      if (checkAllPiecesAtGoal(msg.team)) {
        await showBanner('🏆 ' + state['team' + msg.team].name + ' got all 4 pieces to GOAL!', 'winner', 3000);
      }
      break;
    case 'switchTurn':
      if (state.gameLocked) return;
      state.currentTurn = state.currentTurn === 'A' ? 'B' : 'A';
      updateTurn();
      break;
    case 'reset':
      state.teamA = { pieces: [1, 1, 1, 1], treasures: 0, name: state.teamA.name };
      state.teamB = { pieces: [1, 1, 1, 1], treasures: 0, name: state.teamB.name };
      state.currentTurn = 'A';
      state.phase = 'setup';
      state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
      state.gameLocked = false;
      document.getElementById('board').classList.remove('locked');
      document.getElementById('teamAPanel').classList.remove('winner');
      document.getElementById('teamBPanel').classList.remove('winner');
      renderPieces();
      renderRevealedItems();
      updateTreasureBadge('A');
      updateTreasureBadge('B');
      updateSnakeBadge('A'); updateSnakeBadge('B');
      updatePitfallBadge('A'); updatePitfallBadge('B');
      updateTurn();
      updatePhase();
      stopBgMusic();
      clearAudienceLog();
      break;
    case 'startGame':
      state.phase = 'playing';
      if (msg.items) state.items = msg.items;
      if (msg.teamAName) state.teamA.name = msg.teamAName;
      if (msg.teamBName) state.teamB.name = msg.teamBName;
      state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
      state.gameLocked = false;
      document.getElementById('board').classList.remove('locked');
      document.getElementById('teamAPanel').classList.remove('winner');
      document.getElementById('teamBPanel').classList.remove('winner');
      updateTreasureBadge('A');
      updateTreasureBadge('B');
      updateSnakeBadge('A'); updateSnakeBadge('B');
      updatePitfallBadge('A'); updatePitfallBadge('B');
      renderRevealedItems();
      renderTeamNames();
      updatePhase();
      playBgMusic();
      clearAudienceLog();
      break;
    case 'setupMode':
      state.phase = 'setup';
      updatePhase();
      stopBgMusic();
      break;
    case 'updateNames':
      if (msg.teamAName !== undefined) state.teamA.name = msg.teamAName;
      if (msg.teamBName !== undefined) state.teamB.name = msg.teamBName;
      renderTeamNames();
      break;
    case 'endGameNow':
      if (!state.gameLocked) await lockGame();
      stopBgMusic();
      break;
    case 'rewindPiece':
  if (state.gameLocked) return;
  if (msg.team && typeof msg.pieceIdx === 'number' && typeof msg.position === 'number') {
    state['team' + msg.team].pieces[msg.pieceIdx] = msg.position;

    // Unclaim collected treasures from that move
    if (msg.unclaimTreasures && msg.unclaimTreasures.length) {
      msg.unclaimTreasures.forEach(function(t) {
        state.revealed.treasures.delete(t.cell);
        // Refund the collector
        state['team' + msg.team].treasures -= t.ownerTeams.length;
        if (state['team' + msg.team].treasures < 0) state['team' + msg.team].treasures = 0;
        // Update badges for OWNER teams (their treasure goes back to "unrevealed")
        t.ownerTeams.forEach(function(ownerTeam) {
          updateTreasureBadge(ownerTeam, false);
        });
      });
      updateScores();
      renderRevealedItems();  // removes the dug-hole markers
    }

    renderPieces();
    cellElements[msg.position].classList.add('highlight');
    playSound('sndDice', 0.4);
    setTimeout(function() {
      cellElements[msg.position].classList.remove('highlight');
    }, 500);
  }
      // Mark most recent non-undone audience log entry as undone
    const list = document.getElementById('audienceLogList');
    if (list) {
      const entries = list.querySelectorAll('.alog-entry');
      for (let k = 0; k < entries.length; k++) {
        if (!entries[k].classList.contains('undone')) {
          entries[k].classList.add('undone');
          break;
        }
      }
    }    
  break;
  }
}
