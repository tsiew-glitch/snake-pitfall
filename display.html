<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake & Pitfall — Display</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.3em;
      margin: 8px 0;
      text-shadow: 0 2px 10px rgba(74, 144, 226, 0.5);
    }
    #topBar {
      display: flex;
      gap: 30px;
      align-items: center;
      font-size: 1.2em;
      margin-bottom: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #status { padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    .waiting { background: #ff9800; }
    .connected { background: #4caf50; }

    #timer {
      font-size: 2em;
      font-weight: bold;
      padding: 10px 24px;
      border-radius: 12px;
      background: rgba(39, 174, 96, 0.25);
      border: 2px solid #27ae60;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }
    #timer.hidden { display: none; }
    #timer.warning { background: rgba(243, 156, 18, 0.3); border-color: #f39c12; color: #f39c12; }
    #timer.urgent { background: rgba(231, 76, 60, 0.4); border-color: #e74c3c; color: #ffaaaa; animation: urgentPulse 0.6s infinite; }
    #timer.paused { background: rgba(155, 89, 182, 0.3); border-color: #9b59b6; color: #d3a4ee; }
    @keyframes urgentPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(231,76,60,0); }
      50% { transform: scale(1.08); box-shadow: 0 0 30px rgba(231,76,60,0.7); }
    }

    #gameStatusBadge {
      font-size: 1.3em;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 10px;
      animation: pulse 1s infinite;
    }
    #gameStatusBadge.hidden { display: none; }
    #gameStatusBadge.final-turn-a { background: rgba(74, 144, 226, 0.4); border: 2px solid #4a90e2; }
    #gameStatusBadge.final-turn-b { background: rgba(231, 76, 60, 0.4); border: 2px solid #e74c3c; }
    #gameStatusBadge.game-over { background: rgba(212, 175, 55, 0.5); border: 2px solid #d4af37; animation: none; }

    #phaseBanner {
      font-size: 2em;
      padding: 30px 60px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      text-align: center;
      margin: 40px 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    #phaseBanner.hidden { display: none; }

    #boardWrapper {
      position: relative;
      width: min(65vh, 88vw);
      aspect-ratio: 1 / 1;
    }
    #boardWrapper.hidden { display: none; }
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 5px;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
    }
    #board.locked { opacity: 0.85; pointer-events: none; }
    #arrowSvg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .cell {
      background: linear-gradient(145deg, #2a3568, #1e2850);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
      transition: background 0.3s;
      overflow: hidden;
      padding: 4px;
    }
    .cell.start { background: linear-gradient(145deg, #2d7a3d, #1f5a2c); }
    .cell.goal { background: linear-gradient(145deg, #d4af37, #b8941f); color: #0a0e27; }
    .cell-number {
      position: absolute;
      top: 3px;
      left: 5px;
      font-size: 0.85em;
      opacity: 0.7;
      z-index: 4;
    }
    .pieces {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      font-size: 1.1em;
      z-index: 6;
      max-width: 100%;
    }
    .piece {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.6em;
      line-height: 1;
    }
    .item-icons {
      position: absolute;
      top: 2px;
      right: 4px;
      display: flex;
      gap: 3px;
      font-size: 0.9em;
      z-index: 4;
      line-height: 1;
    }
    .item-icon.treasure {
      font-size: 1.5em;
      animation: treasureGlow 1.5s infinite ease-in-out;
    }
    @keyframes treasureGlow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(255,215,0,0.6)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 14px rgba(255,215,0,1)); transform: scale(1.15); }
    }
    .item-icon.conflict { animation: conflictPulse 0.8s infinite; color: #ff9800; }
    @keyframes conflictPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .cell.highlight {
      background: linear-gradient(145deg, #f39c12, #d68910) !important;
      animation: flash 0.4s ease;
    }
    .cell.snake-reveal {
      background: linear-gradient(145deg, #27ae60, #229954) !important;
      animation: revealFlash 0.6s ease;
    }
    .cell.pitfall-reveal {
      background: linear-gradient(145deg, #c0392b, #a93226) !important;
      animation: revealFlash 0.6s ease;
    }
    .cell.treasure-reveal {
      background: linear-gradient(145deg, #d4af37, #f1c40f) !important;
      animation: revealFlash 0.6s ease;
    }
    .cell.conflict-reveal {
      background: linear-gradient(145deg, #8e44ad, #6c3483) !important;
      animation: revealFlash 0.6s ease;
    }
    @keyframes flash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes revealFlash {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); box-shadow: 0 0 30px rgba(255,255,255,0.9); }
      100% { transform: scale(1); }
    }

    /* Cute snake animation */
    .snake-body {
      animation: snakeWiggle 2s infinite ease-in-out;
      transform-origin: center;
    }
    @keyframes snakeWiggle {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    .snake-head { animation: headBob 1.5s infinite ease-in-out; }
    @keyframes headBob {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .snake-tongue { animation: tongueFlick 0.8s infinite; }
    @keyframes tongueFlick {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Cute pitfall animation */
    .pit-hole-source { animation: pitPulse 2s infinite ease-in-out; transform-origin: center; }
    @keyframes pitPulse {
      0%, 100% { opacity: 0.95; }
      50% { opacity: 0.7; }
    }
    .fall-trajectory { animation: fallShimmer 1.5s infinite; }
    @keyframes fallShimmer {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    #scorePanel {
      display: flex;
      gap: 30px;
      margin-top: 18px;
      font-size: 1.1em;
    }
    #scorePanel.hidden { display: none; }
    .team-score {
      padding: 12px 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      min-width: 280px;
      text-align: center;
      transition: all 0.3s;
    }
    .team-score.active {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }
    .team-score.winner {
      background: rgba(76, 175, 80, 0.35);
      box-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
      transform: scale(1.1);
      border: 2px solid #4caf50;
    }
    .team-score .label { font-size: 1.15em; font-weight: bold; margin-bottom: 6px; }
    .team-score .total { font-size: 1.8em; font-weight: bold; margin-top: 6px; }
    .team-a-color { color: #4a90e2; }
    .team-b-color { color: #e74c3c; }
    .breakdown { font-size: 0.8em; opacity: 0.85; margin: 4px 0; }
    .piece-positions { font-size: 0.85em; }

    #bigBanner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.6em;
      background: white;
      color: #0a0e27;
      padding: 30px 60px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.4s ease;
      z-index: 200;
      text-align: center;
    }
    #bigBanner.show { transform: translate(-50%, -50%) scale(1); }
    #bigBanner.snake { background: #27ae60; color: white; }
    #bigBanner.pitfall { background: #c0392b; color: white; }
    #bigBanner.treasure { background: #d4af37; color: #1a1f3a; }
    #bigBanner.skip { background: #9b59b6; color: white; }
    #bigBanner.conflict { background: #8e44ad; color: white; }
    #bigBanner.goal { background: #f39c12; color: white; }
    #bigBanner.timeup { background: #e74c3c; color: white; font-size: 3.5em; }
    #bigBanner.finalturn { background: #f39c12; color: white; font-size: 3em; }
    #bigBanner.gameover { background: #d4af37; color: #1a1f3a; font-size: 3.5em; }
    #bigBanner.winner { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); color: #1a1f3a; font-size: 3.2em; }

    #diceDisplay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 7em;
      background: white;
      color: #0a0e27;
      width: 180px;
      height: 180px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #diceDisplay.show { transform: translate(-50%, -50%) scale(1); }
  </style>
</head>
<body>
  <h1>🎲 Snake & Pitfall</h1>
  <div id="topBar">
    <div>Turn: <span id="turnIndicator" class="team-a-color">🔵 Team A</span></div>
    <div id="timer" class="hidden">⏱️ 15:00</div>
    <div id="gameStatusBadge" class="hidden"></div>
    <div id="status" class="waiting">⏳ Waiting for GM...</div>
  </div>

  <div id="phaseBanner" class="hidden">🤫 Teams are setting up the board...</div>

  <div id="boardWrapper" class="hidden">
    <div id="board"></div>
    <svg id="arrowSvg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <defs>
        <radialGradient id="snakeBodyGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#52d685" />
          <stop offset="100%" stop-color="#1e7d3f" />
        </radialGradient>
        <radialGradient id="snakeHeadGrad" cx="40%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#7be899" />
          <stop offset="100%" stop-color="#1e7d3f" />
        </radialGradient>
        <radialGradient id="pitGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#000" />
          <stop offset="70%" stop-color="#1a1a1a" />
          <stop offset="100%" stop-color="#3d2817" />
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div id="scorePanel" class="hidden">
    <div class="team-score active" id="teamAPanel">
      <div class="label team-a-color">🔵 Team A</div>
      <div class="piece-positions" id="teamAPieces">①1 ②1 ③1 ④1</div>
      <div class="breakdown">💎 <span id="teamATreasures">0</span> · Pieces sum: <span id="teamAPieceScore">4</span></div>
      <div class="total">TOTAL: <span id="teamATotal">4</span></div>
    </div>
    <div class="team-score" id="teamBPanel">
      <div class="label team-b-color">🔴 Team B</div>
      <div class="piece-positions" id="teamBPieces">①1 ②1 ③1 ④1</div>
      <div class="breakdown">💎 <span id="teamBTreasures">0</span> · Pieces sum: <span id="teamBPieceScore">4</span></div>
      <div class="total">TOTAL: <span id="teamBTotal">4</span></div>
    </div>
  </div>

  <div id="diceDisplay">🎲</div>
  <div id="bigBanner"></div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const state = {
      phase: 'setup',
      teamA: { pieces: [1, 1, 1, 1], treasures: 0, skipNext: false },
      teamB: { pieces: [1, 1, 1, 1], treasures: 0, skipNext: false },
      currentTurn: 'A',
      items: {
        A: { snakes: [], pitfalls: [], treasures: [] },
        B: { snakes: [], pitfalls: [], treasures: [] }
      },
      revealed: { snakes: new Set(), pitfalls: new Set(), treasures: new Set() },
      firstMover: null,
      timeUpReached: false,
      finalTurnPending: false,
      gameLocked: false
    };

    const PIECE_NUMS = ['①', '②', '③', '④'];
    function pieceEmoji(team, idx) {
      return (team === 'A' ? '🔵' : '🔴') + PIECE_NUMS[idx];
    }

    let timerSeconds = 15 * 60;
    let timerRunning = false;
    let timerInterval = null;

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function renderTimer() {
      const timerEl = document.getElementById('timer');
      timerEl.textContent = `⏱️ ${formatTime(timerSeconds)}`;
      timerEl.classList.remove('warning', 'urgent', 'paused');
      if (state.phase !== 'playing') { timerEl.classList.add('hidden'); return; }
      timerEl.classList.remove('hidden');
      if (!timerRunning && timerSeconds > 0) {
        timerEl.classList.add('paused');
        timerEl.textContent = `⏸️ ${formatTime(timerSeconds)}`;
      } else if (timerSeconds <= 30) timerEl.classList.add('urgent');
      else if (timerSeconds <= 60) timerEl.classList.add('warning');
    }

    function startTimer() {
      if (timerRunning) return;
      timerRunning = true;
      timerInterval = setInterval(async () => {
        timerSeconds--;
        if (timerSeconds < 0) timerSeconds = 0;
        renderTimer();
        if (timerSeconds === 0 && !state.timeUpReached) {
          state.timeUpReached = true;
          stopTimer();
          await onTimeUp();
        }
      }, 1000);
      renderTimer();
    }

    function stopTimer() {
      timerRunning = false;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      renderTimer();
    }

    function resetTimer(secs = 900) {
      stopTimer();
      timerSeconds = secs;
      renderTimer();
    }

    function adjustTimer(deltaSecs) {
      timerSeconds = Math.max(0, Math.min(60 * 60, timerSeconds + deltaSecs));
      renderTimer();
    }

    async function onTimeUp() {
      await showBanner("⏰ TIME'S UP!", 'timeup', 2500);
      if (state.firstMover === 'A') {
        state.finalTurnPending = true;
        state.currentTurn = 'B';
        updateTurn();
        updateGameStatusBadge();
        await showBanner("🏁 FINAL TURN — Team B", 'finalturn', 2500);
      } else if (state.firstMover === 'B') {
        state.finalTurnPending = true;
        state.currentTurn = 'A';
        updateTurn();
        updateGameStatusBadge();
        await showBanner("🏁 FINAL TURN — Team A", 'finalturn', 2500);
      } else await lockGame();
    }

    async function lockGame() {
      state.gameLocked = true;
      state.finalTurnPending = false;
      updateGameStatusBadge();
      document.getElementById('board').classList.add('locked');
      await showBanner("🏆 GAME OVER!", 'gameover', 2500);
      declareWinner();
    }

    function declareWinner() {
      const aTotal = state.teamA.pieces.reduce((s, p) => s + p, 0) + (state.teamA.treasures * 25);
      const bTotal = state.teamB.pieces.reduce((s, p) => s + p, 0) + (state.teamB.treasures * 25);
      const aPanel = document.getElementById('teamAPanel');
      const bPanel = document.getElementById('teamBPanel');
      aPanel.classList.remove('active', 'winner');
      bPanel.classList.remove('active', 'winner');
      let winText = '';
      if (aTotal > bTotal) { aPanel.classList.add('winner'); winText = `🏆 TEAM A WINS! ${aTotal} vs ${bTotal}`; }
      else if (bTotal > aTotal) { bPanel.classList.add('winner'); winText = `🏆 TEAM B WINS! ${bTotal} vs ${aTotal}`; }
      else { winText = `🤝 DRAW! ${aTotal} – ${bTotal}`; aPanel.classList.add('winner'); bPanel.classList.add('winner'); }
      setTimeout(() => showBanner(winText, 'winner', 4000), 200);
    }

    function updateGameStatusBadge() {
      const badge = document.getElementById('gameStatusBadge');
      badge.classList.remove('hidden', 'final-turn-a', 'final-turn-b', 'game-over');
      if (state.gameLocked) { badge.textContent = '🏆 Game Over'; badge.classList.add('game-over'); }
      else if (state.finalTurnPending) {
        const t = state.currentTurn;
        badge.textContent = `🏁 Final Turn — Team ${t}`;
        badge.classList.add(t === 'A' ? 'final-turn-a' : 'final-turn-b');
      } else badge.classList.add('hidden');
    }

    function getCellNumberAt(visualRow, visualCol) {
      const rowFromBottom = 4 - visualRow;
      const rowStart = rowFromBottom * 5 + 1;
      if (rowFromBottom % 2 === 0) return rowStart + visualCol;
      return rowStart + (4 - visualCol);
    }

    function getCellCoords(cellNum) {
      const rowFromBottom = Math.floor((cellNum - 1) / 5);
      const visualRow = 4 - rowFromBottom;
      const posInRow = (cellNum - 1) % 5;
      const visualCol = (rowFromBottom % 2 === 0) ? posInRow : 4 - posInRow;
      return { visualRow, visualCol };
    }

    function getCellCenter(cellNum) {
      const { visualRow, visualCol } = getCellCoords(cellNum);
      const cellSize = 1000 / 5;
      return {
        x: visualCol * cellSize + cellSize / 2,
        y: visualRow * cellSize + cellSize / 2
      };
    }

    const board = document.getElementById('board');
    const cellElements = {};
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cellNum = getCellNumberAt(r, c);
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (cellNum === 1) cell.classList.add('start');
        if (cellNum === 25) cell.classList.add('goal');
        cell.innerHTML = `
          <div class="cell-number">${cellNum}</div>
          <div class="pieces" id="pieces-${cellNum}"></div>
          <div class="item-icons" id="items-${cellNum}"></div>
        `;
        board.appendChild(cell);
        cellElements[cellNum] = cell;
      }
    }

    function renderPieces() {
      for (let i = 1; i <= 25; i++) document.getElementById(`pieces-${i}`).innerHTML = '';
      state.teamA.pieces.forEach((pos, idx) => {
        document.getElementById(`pieces-${pos}`).innerHTML += `<span class="piece">${pieceEmoji('A', idx)}</span>`;
      });
      state.teamB.pieces.forEach((pos, idx) => {
        document.getElementById(`pieces-${pos}`).innerHTML += `<span class="piece">${pieceEmoji('B', idx)}</span>`;
      });
      updateScores();
    }

    function findSnakeFrom(cellNum) {
      for (const team of ['A', 'B']) {
        const f = state.items[team].snakes.find(s => s.from === cellNum);
        if (f) return f;
      }
      return null;
    }
    function findPitfallFrom(cellNum) {
      for (const team of ['A', 'B']) {
        const f = state.items[team].pitfalls.find(p => p.from === cellNum);
        if (f) return f;
      }
      return null;
    }
    function isTreasureAt(cellNum) {
      if (state.revealed.treasures.has(cellNum)) return false;
      for (const team of ['A', 'B']) if (state.items[team].treasures.includes(cellNum)) return true;
      return false;
    }

    function renderRevealedItems() {
      for (let i = 1; i <= 25; i++) document.getElementById(`items-${i}`).innerHTML = '';

      // Clear existing SVG drawings (keep defs)
      const svg = document.getElementById('arrowSvg');
      const oldDrawings = svg.querySelectorAll('.arrow-line');
      oldDrawings.forEach(a => a.remove());

      // Track which cells have which heads to detect conflict
      const cellsWithSnakeHead = new Set();
      const cellsWithPitfallHead = new Set();
      state.revealed.snakes.forEach(c => cellsWithSnakeHead.add(c));
      state.revealed.pitfalls.forEach(c => cellsWithPitfallHead.add(c));

      // Draw snakes
      state.revealed.snakes.forEach(fromCell => {
        const item = findSnakeFrom(fromCell);
        if (!item) return;
        const conflict = cellsWithPitfallHead.has(fromCell);
        drawCuteSnake(fromCell, item.to);
        // Small corner icon as marker
        document.getElementById(`items-${fromCell}`).innerHTML += conflict
          ? `<span class="item-icon conflict">⚠️</span>`
          : '';
      });

      // Draw pitfalls
      state.revealed.pitfalls.forEach(fromCell => {
        const item = findPitfallFrom(fromCell);
        if (!item) return;
        const conflict = cellsWithSnakeHead.has(fromCell);
        drawCutePitfall(fromCell, item.to);
        if (conflict && !cellsWithSnakeHead.has(fromCell)) {
          document.getElementById(`items-${fromCell}`).innerHTML += `<span class="item-icon conflict">⚠️</span>`;
        }
      });
    }

    // === Cute Snake Drawing ===
    function drawCuteSnake(fromCell, toCell) {
      const from = getCellCenter(fromCell);
      const to = getCellCenter(toCell);
      const svg = document.getElementById('arrowSvg');
      const SVG_NS = 'http://www.w3.org/2000/svg';

      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const perpX = -dy / dist;
      const perpY = dx / dist;
      const wave = Math.min(dist * 0.35, 60);

      // Wavy path with two control points (S-curve)
      const ctrl1X = from.x + dx * 0.3 + perpX * wave;
      const ctrl1Y = from.y + dy * 0.3 + perpY * wave;
      const ctrl2X = from.x + dx * 0.7 - perpX * wave;
      const ctrl2Y = from.y + dy * 0.7 - perpY * wave;
      const pathD = `M ${from.x} ${from.y} C ${ctrl1X} ${ctrl1Y}, ${ctrl2X} ${ctrl2Y}, ${to.x} ${to.y}`;

      // Outer body (dark green outline)
      const outerBody = document.createElementNS(SVG_NS, 'path');
      outerBody.classList.add('arrow-line', 'snake-body');
      outerBody.setAttribute('d', pathD);
      outerBody.setAttribute('stroke', '#1e7d3f');
      outerBody.setAttribute('stroke-width', '32');
      outerBody.setAttribute('stroke-linecap', 'round');
      outerBody.setAttribute('fill', 'none');
      svg.appendChild(outerBody);

      // Main body (vibrant green)
      const mainBody = document.createElementNS(SVG_NS, 'path');
      mainBody.classList.add('arrow-line', 'snake-body');
      mainBody.setAttribute('d', pathD);
      mainBody.setAttribute('stroke', '#27ae60');
      mainBody.setAttribute('stroke-width', '24');
      mainBody.setAttribute('stroke-linecap', 'round');
      mainBody.setAttribute('fill', 'none');
      svg.appendChild(mainBody);

      // Inner highlight (lighter)
      const innerBody = document.createElementNS(SVG_NS, 'path');
      innerBody.classList.add('arrow-line', 'snake-body');
      innerBody.setAttribute('d', pathD);
      innerBody.setAttribute('stroke', '#52d685');
      innerBody.setAttribute('stroke-width', '10');
      innerBody.setAttribute('stroke-linecap', 'round');
      innerBody.setAttribute('fill', 'none');
      innerBody.setAttribute('opacity', '0.7');
      svg.appendChild(innerBody);

      // Snake head at destination (cute round head)
      const head = document.createElementNS(SVG_NS, 'circle');
      head.classList.add('arrow-line', 'snake-head');
      head.setAttribute('cx', to.x);
      head.setAttribute('cy', to.y);
      head.setAttribute('r', '28');
      head.setAttribute('fill', 'url(#snakeHeadGrad)');
      head.setAttribute('stroke', '#1e7d3f');
      head.setAttribute('stroke-width', '3');
      svg.appendChild(head);

      // Tail at source (small green ball)
      const tail = document.createElementNS(SVG_NS, 'circle');
      tail.classList.add('arrow-line');
      tail.setAttribute('cx', from.x);
      tail.setAttribute('cy', from.y);
      tail.setAttribute('r', '14');
      tail.setAttribute('fill', '#1e7d3f');
      svg.appendChild(tail);

      // Eyes (white)
      const eye1 = document.createElementNS(SVG_NS, 'circle');
      eye1.classList.add('arrow-line');
      eye1.setAttribute('cx', to.x - 9);
      eye1.setAttribute('cy', to.y - 8);
      eye1.setAttribute('r', '6');
      eye1.setAttribute('fill', 'white');
      svg.appendChild(eye1);

      const eye2 = document.createElementNS(SVG_NS, 'circle');
      eye2.classList.add('arrow-line');
      eye2.setAttribute('cx', to.x + 9);
      eye2.setAttribute('cy', to.y - 8);
      eye2.setAttribute('r', '6');
      eye2.setAttribute('fill', 'white');
      svg.appendChild(eye2);

      // Pupils (black)
      const pup1 = document.createElementNS(SVG_NS, 'circle');
      pup1.classList.add('arrow-line');
      pup1.setAttribute('cx', to.x - 8);
      pup1.setAttribute('cy', to.y - 7);
      pup1.setAttribute('r', '3');
      pup1.setAttribute('fill', '#000');
      svg.appendChild(pup1);

      const pup2 = document.createElementNS(SVG_NS, 'circle');
      pup2.classList.add('arrow-line');
      pup2.setAttribute('cx', to.x + 10);
      pup2.setAttribute('cy', to.y - 7);
      pup2.setAttribute('r', '3');
      pup2.setAttribute('fill', '#000');
      svg.appendChild(pup2);

      // Forked tongue
      const tongue = document.createElementNS(SVG_NS, 'path');
      tongue.classList.add('arrow-line', 'snake-tongue');
      tongue.setAttribute('d',
        `M ${to.x} ${to.y + 12}
         L ${to.x} ${to.y + 22}
         M ${to.x} ${to.y + 22}
         L ${to.x - 6} ${to.y + 28}
         M ${to.x} ${to.y + 22}
         L ${to.x + 6} ${to.y + 28}`);
      tongue.setAttribute('stroke', '#ff4d8d');
      tongue.setAttribute('stroke-width', '3');
      tongue.setAttribute('stroke-linecap', 'round');
      tongue.setAttribute('fill', 'none');
      svg.appendChild(tongue);
    }

    // === Cute Pitfall Drawing ===
    function drawCutePitfall(fromCell, toCell) {
      const from = getCellCenter(fromCell);
      const to = getCellCenter(toCell);
      const svg = document.getElementById('arrowSvg');
      const SVG_NS = 'http://www.w3.org/2000/svg';

      // Source hole - outer brown rim
      const sourceRim = document.createElementNS(SVG_NS, 'ellipse');
      sourceRim.classList.add('arrow-line', 'pit-hole-source');
      sourceRim.setAttribute('cx', from.x);
      sourceRim.setAttribute('cy', from.y);
      sourceRim.setAttribute('rx', '45');
      sourceRim.setAttribute('ry', '18');
      sourceRim.setAttribute('fill', '#5d4037');
      sourceRim.setAttribute('stroke', '#8b4513');
      sourceRim.setAttribute('stroke-width', '3');
      svg.appendChild(sourceRim);

      // Source hole - dark interior
      const sourceHole = document.createElementNS(SVG_NS, 'ellipse');
      sourceHole.classList.add('arrow-line', 'pit-hole-source');
      sourceHole.setAttribute('cx', from.x);
      sourceHole.setAttribute('cy', from.y);
      sourceHole.setAttribute('rx', '36');
      sourceHole.setAttribute('ry', '13');
      sourceHole.setAttribute('fill', 'url(#pitGrad)');
      svg.appendChild(sourceHole);

      // Inner darkness (deeper center)
      const sourceDeep = document.createElementNS(SVG_NS, 'ellipse');
      sourceDeep.classList.add('arrow-line');
      sourceDeep.setAttribute('cx', from.x);
      sourceDeep.setAttribute('cy', from.y);
      sourceDeep.setAttribute('rx', '24');
      sourceDeep.setAttribute('ry', '7');
      sourceDeep.setAttribute('fill', '#000');
      svg.appendChild(sourceDeep);

      // Dashed red falling trajectory
      const fallLine = document.createElementNS(SVG_NS, 'line');
      fallLine.classList.add('arrow-line', 'fall-trajectory');
      fallLine.setAttribute('x1', from.x);
      fallLine.setAttribute('y1', from.y + 15);
      fallLine.setAttribute('x2', to.x);
      fallLine.setAttribute('y2', to.y - 15);
      fallLine.setAttribute('stroke', '#e74c3c');
      fallLine.setAttribute('stroke-width', '5');
      fallLine.setAttribute('stroke-dasharray', '10,8');
      fallLine.setAttribute('stroke-linecap', 'round');
      svg.appendChild(fallLine);

      // Destination - "impact" hole (smaller, darker)
      const destRim = document.createElementNS(SVG_NS, 'ellipse');
      destRim.classList.add('arrow-line');
      destRim.setAttribute('cx', to.x);
      destRim.setAttribute('cy', to.y);
      destRim.setAttribute('rx', '38');
      destRim.setAttribute('ry', '14');
      destRim.setAttribute('fill', '#5d4037');
      destRim.setAttribute('stroke', '#8b4513');
      destRim.setAttribute('stroke-width', '3');
      svg.appendChild(destRim);

      const destHole = document.createElementNS(SVG_NS, 'ellipse');
      destHole.classList.add('arrow-line');
      destHole.setAttribute('cx', to.x);
      destHole.setAttribute('cy', to.y);
      destHole.setAttribute('rx', '30');
      destHole.setAttribute('ry', '10');
      destHole.setAttribute('fill', 'url(#pitGrad)');
      svg.appendChild(destHole);
    }

    function updateScores() {
      const aPieces = state.teamA.pieces.reduce((s, p) => s + p, 0);
      const bPieces = state.teamB.pieces.reduce((s, p) => s + p, 0);
      const aTotal = aPieces + (state.teamA.treasures * 25);
      const bTotal = bPieces + (state.teamB.treasures * 25);
      const aText = state.teamA.pieces.map((p, i) => `${PIECE_NUMS[i]}${p}`).join(' ');
      const bText = state.teamB.pieces.map((p, i) => `${PIECE_NUMS[i]}${p}`).join(' ');
      document.getElementById('teamAPieces').textContent = aText;
      document.getElementById('teamBPieces').textContent = bText;
      document.getElementById('teamATreasures').textContent = state.teamA.treasures;
      document.getElementById('teamBTreasures').textContent = state.teamB.treasures;
      document.getElementById('teamAPieceScore').textContent = aPieces;
      document.getElementById('teamBPieceScore').textContent = bPieces;
      document.getElementById('teamATotal').textContent = aTotal;
      document.getElementById('teamBTotal').textContent = bTotal;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function showBanner(text, type, duration = 1500) {
      const banner = document.getElementById('bigBanner');
      banner.textContent = text;
      banner.className = type;
      banner.classList.add('show');
      await sleep(duration);
      banner.classList.remove('show');
      await sleep(200);
    }

    async function showDice(value) {
      const diceEl = document.getElementById('diceDisplay');
      const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄'];
      diceEl.textContent = diceFaces[value - 1] || '🎲';
      diceEl.classList.add('show');
      await sleep(1100);
      diceEl.classList.remove('show');
      await sleep(250);
    }

    async function diceWalk(team, pieceIdx, steps) {
      let currentPos = state[`team${team}`].pieces[pieceIdx];
      for (let i = 0; i < steps; i++) {
        currentPos = Math.min(currentPos + 1, 25);
        state[`team${team}`].pieces[pieceIdx] = currentPos;
        renderPieces();
        const cell = cellElements[currentPos];
        cell.classList.add('highlight');
        await sleep(300);
        cell.classList.remove('highlight');
        if (currentPos === 25) break;
      }
      return currentPos;
    }

    async function triggerChain(team, pieceIdx, landedCell) {
      const visitedCells = new Set([landedCell]);
      let currentCell = landedCell;
      let chainCount = 0;
      const maxChain = 10;

      while (chainCount < maxChain) {
        chainCount++;
        let triggered = false;

        if (isTreasureAt(currentCell)) {
          state.revealed.treasures.add(currentCell);
          state[`team${team}`].treasures++;
          const cell = cellElements[currentCell];
          cell.classList.add('treasure-reveal');
          await showBanner(`💎 TREASURE! Team ${team} +25 pts`, 'treasure', 1500);
          cell.classList.remove('treasure-reveal');
          renderRevealedItems();
          updateScores();
        }

        const snake = findSnakeFrom(currentCell);
        const pitfall = findPitfallFrom(currentCell);
        if (snake && pitfall) {
          state.revealed.snakes.add(currentCell);
          state.revealed.pitfalls.add(currentCell);
          const cell = cellElements[currentCell];
          cell.classList.add('conflict-reveal');
          await showBanner(`⚠️ CONFLICT at ${currentCell}! Team ${team} skips next turn`, 'conflict', 2500);
          cell.classList.remove('conflict-reveal');
          renderRevealedItems();
          state[`team${team}`].skipNext = true;
          return;
        }

        if (snake) {
          state.revealed.snakes.add(currentCell);
          const cell = cellElements[currentCell];
          cell.classList.add('snake-reveal');
          await showBanner(`🐍 SNAKE! ${currentCell} ↑ ${snake.to}`, 'snake', 1400);
          cell.classList.remove('snake-reveal');
          renderRevealedItems();
          state[`team${team}`].pieces[pieceIdx] = snake.to;
          renderPieces();
          cellElements[snake.to].classList.add('highlight');
          await sleep(500);
          cellElements[snake.to].classList.remove('highlight');
          currentCell = snake.to;
          triggered = true;
          if (visitedCells.has(currentCell)) {
            await showBanner(`🔄 LOOP! Team ${team} skips next turn`, 'skip', 2000);
            state[`team${team}`].skipNext = true;
            return;
          }
          visitedCells.add(currentCell);
          continue;
        }

        if (pitfall) {
          state.revealed.pitfalls.add(currentCell);
          const cell = cellElements[currentCell];
          cell.classList.add('pitfall-reveal');
          await showBanner(`🕳️ PITFALL! ${currentCell} ↓ ${pitfall.to}`, 'pitfall', 1400);
          cell.classList.remove('pitfall-reveal');
          renderRevealedItems();
          state[`team${team}`].pieces[pieceIdx] = pitfall.to;
          renderPieces();
          cellElements[pitfall.to].classList.add('highlight');
          await sleep(500);
          cellElements[pitfall.to].classList.remove('highlight');
          currentCell = pitfall.to;
          triggered = true;
          if (visitedCells.has(currentCell)) {
            await showBanner(`🔄 LOOP! Team ${team} skips next turn`, 'skip', 2000);
            state[`team${team}`].skipNext = true;
            return;
          }
          visitedCells.add(currentCell);
          continue;
        }

        if (!triggered) break;
      }

      if (currentCell === 25) {
        await showBanner(`🏁 ${pieceEmoji(team, pieceIdx)} reached the GOAL!`, 'goal', 1500);
      }
    }

    function checkAllPiecesAtGoal(team) {
      return state[`team${team}`].pieces.every(p => p === 25);
    }

    function updateTurn() {
      const indicator = document.getElementById('turnIndicator');
      const aPanel = document.getElementById('teamAPanel');
      const bPanel = document.getElementById('teamBPanel');
      if (state.currentTurn === 'A') {
        indicator.innerHTML = '🔵 Team A';
        indicator.className = 'team-a-color';
        if (!state.gameLocked) { aPanel.classList.add('active'); bPanel.classList.remove('active'); }
      } else {
        indicator.innerHTML = '🔴 Team B';
        indicator.className = 'team-b-color';
        if (!state.gameLocked) { bPanel.classList.add('active'); aPanel.classList.remove('active'); }
      }
    }

    function updatePhase() {
      const banner = document.getElementById('phaseBanner');
      const boardWrap = document.getElementById('boardWrapper');
      const score = document.getElementById('scorePanel');
      if (state.phase === 'setup') {
        banner.classList.remove('hidden');
        boardWrap.classList.add('hidden');
        score.classList.add('hidden');
        stopTimer();
      } else {
        banner.classList.add('hidden');
        boardWrap.classList.remove('hidden');
        score.classList.remove('hidden');
      }
      renderTimer();
      updateGameStatusBadge();
    }

    renderPieces();
    updateTurn();
    updatePhase();

    const ROOM_ID = 'snake-pitfall-2026-display';
    const statusEl = document.getElementById('status');
    const peer = new Peer(ROOM_ID, { debug: 2 });
    peer.on('open', () => { statusEl.textContent = '✅ Ready'; });
    peer.on('connection', (conn) => {
      statusEl.textContent = '🟢 GM Connected';
      statusEl.className = 'connected';
      conn.on('data', async (msg) => {
        console.log('Received:', msg);
        await handleAction(msg);
      });
      conn.on('close', () => {
        statusEl.textContent = '⚠️ GM disconnected';
        statusEl.className = 'waiting';
      });
    });
    peer.on('error', (err) => { statusEl.textContent = '❌ ' + err.type; });

    async function handleAction(msg) {
      switch (msg.type) {
        case 'movePiece':
          if (state.gameLocked) return;
          await showDice(msg.dice);
          if (state[`team${msg.team}`].skipNext) {
            await showBanner(`⏭️ Team ${msg.team} skips this turn!`, 'skip', 1800);
            state[`team${msg.team}`].skipNext = false;
            renderPieces();
            if (state.firstMover === null) state.firstMover = msg.team;
            if (state.finalTurnPending) {
              state.finalTurnPending = false;
              await lockGame();
            }
            return;
          }
          if (state.firstMover === null) state.firstMover = msg.team;
          const landedCell = await diceWalk(msg.team, msg.pieceIdx, msg.dice);
          await sleep(200);
          await triggerChain(msg.team, msg.pieceIdx, landedCell);
          if (checkAllPiecesAtGoal(msg.team)) {
            await showBanner(`🏆 Team ${msg.team} got all 4 pieces to GOAL!`, 'winner', 3000);
          }
          if (state.finalTurnPending) {
            state.finalTurnPending = false;
            await lockGame();
          }
          break;
        case 'switchTurn':
          if (state.gameLocked) return;
          state.currentTurn = state.currentTurn === 'A' ? 'B' : 'A';
          updateTurn();
          break;
        case 'reset':
          state.teamA = { pieces: [1, 1, 1, 1], treasures: 0, skipNext: false };
          state.teamB = { pieces: [1, 1, 1, 1], treasures: 0, skipNext: false };
          state.currentTurn = 'A';
          state.phase = 'setup';
          state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
          state.firstMover = null;
          state.timeUpReached = false;
          state.finalTurnPending = false;
          state.gameLocked = false;
          document.getElementById('board').classList.remove('locked');
          document.getElementById('teamAPanel').classList.remove('winner');
          document.getElementById('teamBPanel').classList.remove('winner');
          resetTimer();
          renderPieces();
          renderRevealedItems();
          updateTurn();
          updatePhase();
          break;
        case 'startGame':
          state.phase = 'playing';
          if (msg.items) state.items = msg.items;
          state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
          state.firstMover = null;
          state.timeUpReached = false;
          state.finalTurnPending = false;
          state.gameLocked = false;
          document.getElementById('board').classList.remove('locked');
          document.getElementById('teamAPanel').classList.remove('winner');
          document.getElementById('teamBPanel').classList.remove('winner');
          renderRevealedItems();
          updatePhase();
          break;
        case 'setupMode':
          state.phase = 'setup';
          updatePhase();
          break;
        case 'endGameNow':
          if (!state.gameLocked) await lockGame();
          break;
        case 'timerStart': startTimer(); break;
        case 'timerPause': stopTimer(); break;
        case 'timerReset': resetTimer(msg.seconds || 900); state.timeUpReached = false; break;
        case 'timerAdjust': adjustTimer(msg.delta); break;
      }
    }
  </script>
</body>
</html>
