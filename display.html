<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake & Pitfall — Display</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.3em;
      margin: 8px 0;
      text-shadow: 0 2px 10px rgba(74, 144, 226, 0.5);
    }
    #topBar {
      display: flex;
      gap: 30px;
      align-items: center;
      font-size: 1.2em;
      margin-bottom: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #status { padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    .waiting { background: #ff9800; }
    .connected { background: #4caf50; }

    #gameStatusBadge {
      font-size: 1.3em; font-weight: bold;
      padding: 8px 18px; border-radius: 10px;
    }
    #gameStatusBadge.hidden { display: none; }
    #gameStatusBadge.game-over { background: rgba(212, 175, 55, 0.5); border: 2px solid #d4af37; }

    #phaseBanner {
      font-size: 2em;
      padding: 30px 60px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      text-align: center;
      margin: 40px 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    #phaseBanner.hidden { display: none; }

    #boardWrapper {
      position: relative;
      width: min(65vh, 88vw);
      aspect-ratio: 1 / 1;
    }
    #boardWrapper.hidden { display: none; }
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 5px;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
    }
    #board.locked { opacity: 0.85; pointer-events: none; }
    #arrowSvg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .cell {
      background: linear-gradient(145deg, #2a3568, #1e2850);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
      transition: background 0.3s;
      overflow: hidden;
      padding: 4px;
    }
    .cell.start { background: linear-gradient(145deg, #2d7a3d, #1f5a2c); }
    .cell.goal { background: linear-gradient(145deg, #d4af37, #b8941f); color: #0a0e27; }
    .cell-number {
      position: absolute;
      top: 3px;
      left: 5px;
      font-size: 0.85em;
      opacity: 0.7;
      z-index: 4;
    }
    .pieces {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      font-size: 1.2em;
      z-index: 10;
      max-width: 100%;
      position: relative;
    }
    .piece {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.6em;
      line-height: 1;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.9));
    }

    .cell.highlight {
      background: linear-gradient(145deg, #f39c12, #d68910) !important;
      animation: flash 0.4s ease;
    }
    .cell.snake-reveal { animation: revealFlash 0.6s ease; }
    .cell.pitfall-reveal { animation: revealFlash 0.6s ease; }
    .cell.treasure-reveal-a { background: linear-gradient(145deg, #d4af37, #f1c40f) !important; animation: revealFlash 0.6s ease; }
    .cell.treasure-reveal-b { background: linear-gradient(145deg, #1abc9c, #16a085) !important; animation: revealFlash 0.6s ease; }
    .cell.conflict-reveal { background: linear-gradient(145deg, #8e44ad, #6c3483) !important; animation: revealFlash 0.6s ease; }
    @keyframes flash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes revealFlash {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); box-shadow: 0 0 30px rgba(255,255,255,0.9); }
      100% { transform: scale(1); }
    }

    .snake-body { animation: snakeWiggle 2s infinite ease-in-out; }
    @keyframes snakeWiggle {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
    .snake-head { animation: headBob 1.5s infinite ease-in-out; transform-origin: center; transform-box: fill-box; }
    @keyframes headBob {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .snake-tongue { animation: tongueFlick 0.8s infinite; }
    @keyframes tongueFlick {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .pit-hole { animation: pitPulse 2s infinite ease-in-out; }
    @keyframes pitPulse {
      0%, 100% { opacity: 0.95; }
      50% { opacity: 0.7; }
    }
    .fall-trajectory { animation: fallShimmer 1.5s infinite; }
    @keyframes fallShimmer {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    #scorePanel {
      display: flex;
      gap: 30px;
      margin-top: 18px;
      font-size: 1.1em;
    }
    #scorePanel.hidden { display: none; }
    .team-score {
      padding: 12px 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      min-width: 280px;
      text-align: center;
      transition: all 0.3s;
    }
    .team-score.active {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }
    .team-score.winner {
      background: rgba(76, 175, 80, 0.35);
      box-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
      transform: scale(1.1);
      border: 2px solid #4caf50;
    }
    .team-score .label { font-size: 1.15em; font-weight: bold; margin-bottom: 6px; }
    .team-score .total { font-size: 1.8em; font-weight: bold; margin-top: 6px; }
    .team-a-color { color: #4a90e2; }
    .team-b-color { color: #e74c3c; }
    .breakdown { font-size: 0.8em; opacity: 0.85; margin: 4px 0; }
    .piece-positions { font-size: 0.85em; }

    /* === Legend === */
    #legend {
      margin-top: 15px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      font-size: 0.95em;
    }
    #legend.hidden { display: none; }
    .legend-team {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(0,0,0,0.25);
    }
    .legend-team.team-a-border { border: 2px solid #4a90e2; }
    .legend-team.team-b-border { border: 2px solid #e74c3c; }
    .legend-team-title { font-weight: bold; font-size: 1.05em; text-align: center; }
    .legend-row { display: flex; gap: 12px; }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.95em;
    }
    .legend-swatch {
      width: 16px; height: 16px;
      border-radius: 4px;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.3);
    }

    #bigBanner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.3em;
      background: white;
      color: #0a0e27;
      padding: 30px 60px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.4s ease;
      z-index: 200;
      text-align: center;
    }
    #bigBanner.show { transform: translate(-50%, -50%) scale(1); }
    #bigBanner.snake-a { background: #27ae60; color: white; }
    #bigBanner.snake-b { background: #9b59b6; color: white; }
    #bigBanner.pitfall-a { background: #c0392b; color: white; }
    #bigBanner.pitfall-b { background: #e67e22; color: white; }
    #bigBanner.treasure-a { background: #d4af37; color: #1a1f3a; }
    #bigBanner.treasure-b { background: #1abc9c; color: white; }
    #bigBanner.loop { background: #9b59b6; color: white; }
    #bigBanner.conflict { background: #8e44ad; color: white; }
    #bigBanner.goal { background: #f39c12; color: white; }
    #bigBanner.gameover { background: #d4af37; color: #1a1f3a; font-size: 3.5em; }
    #bigBanner.winner { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); color: #1a1f3a; font-size: 3.2em; }

    #diceDisplay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 7em;
      background: white;
      color: #0a0e27;
      width: 180px; height: 180px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #diceDisplay.show { transform: translate(-50%, -50%) scale(1); }
  </style>
</head>
<body>
  <h1>🎲 Snake & Pitfall</h1>
  <div id="topBar">
    <div>Turn: <span id="turnIndicator" class="team-a-color">🔵 Team A</span></div>
    <div id="gameStatusBadge" class="hidden"></div>
    <div id="status" class="waiting">⏳ Waiting for GM...</div>
  </div>

  <div id="phaseBanner" class="hidden">🤫 Teams are setting up the board...</div>

  <div id="boardWrapper" class="hidden">
    <div id="board"></div>
    <svg id="arrowSvg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
      <defs>
        <!-- Team A snake (green) -->
        <radialGradient id="snakeHeadGradA" cx="40%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#7be899" />
          <stop offset="100%" stop-color="#1e7d3f" />
        </radialGradient>
        <!-- Team B snake (purple) -->
        <radialGradient id="snakeHeadGradB" cx="40%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#d2a8e8" />
          <stop offset="100%" stop-color="#6c3483" />
        </radialGradient>
        <!-- Pit gradient (shared, just different rim colors) -->
        <radialGradient id="pitGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#000" />
          <stop offset="70%" stop-color="#1a1a1a" />
          <stop offset="100%" stop-color="#3d2817" />
        </radialGradient>
      </defs>
    </svg>
  </div>

  <div id="scorePanel" class="hidden">
    <div class="team-score active" id="teamAPanel">
      <div class="label team-a-color">🔵 Team A</div>
      <div class="piece-positions" id="teamAPieces">①1 ②1 ③1 ④1</div>
      <div class="breakdown">💎 <span id="teamATreasures">0</span> · Pieces sum: <span id="teamAPieceScore">4</span></div>
      <div class="total">TOTAL: <span id="teamATotal">4</span></div>
    </div>
    <div class="team-score" id="teamBPanel">
      <div class="label team-b-color">🔴 Team B</div>
      <div class="piece-positions" id="teamBPieces">①1 ②1 ③1 ④1</div>
      <div class="breakdown">💎 <span id="teamBTreasures">0</span> · Pieces sum: <span id="teamBPieceScore">4</span></div>
      <div class="total">TOTAL: <span id="teamBTotal">4</span></div>
    </div>
  </div>

  <div id="legend" class="hidden">
    <div class="legend-team team-a-border">
      <div class="legend-team-title team-a-color">🔵 Team A</div>
      <div class="legend-row">
        <span class="legend-item"><span class="legend-swatch" style="background:#27ae60;"></span>🐍</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#c0392b;"></span>🕳️</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#d4af37;"></span>💎</span>
      </div>
    </div>
    <div class="legend-team team-b-border">
      <div class="legend-team-title team-b-color">🔴 Team B</div>
      <div class="legend-row">
        <span class="legend-item"><span class="legend-swatch" style="background:#9b59b6;"></span>🐍</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#e67e22;"></span>🕳️</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#1abc9c;"></span>💎</span>
      </div>
    </div>
  </div>

  <div id="diceDisplay">🎲</div>
  <div id="bigBanner"></div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    // === Team color palette ===
    const TEAM_COLORS = {
      A: {
        snakeOuter: '#1e7d3f', snakeMain: '#27ae60', snakeInner: '#52d685',
        snakeHeadGrad: 'snakeHeadGradA',
        pitRim: '#8b4513', pitRimDark: '#5d4037',
        fallLine: '#c0392b',
        treasureBg: 'treasure-a'
      },
      B: {
        snakeOuter: '#6c3483', snakeMain: '#9b59b6', snakeInner: '#d2a8e8',
        snakeHeadGrad: 'snakeHeadGradB',
        pitRim: '#a0522d', pitRimDark: '#6b3e1a',
        fallLine: '#e67e22',
        treasureBg: 'treasure-b'
      }
    };

    const state = {
      phase: 'setup',
      teamA: { pieces: [1, 1, 1, 1], treasures: 0 },
      teamB: { pieces: [1, 1, 1, 1], treasures: 0 },
      currentTurn: 'A',
      items: {
        A: { snakes: [], pitfalls: [], treasures: [] },
        B: { snakes: [], pitfalls: [], treasures: [] }
      },
      revealed: { snakes: new Set(), pitfalls: new Set(), treasures: new Set() },
      gameLocked: false
    };

    const PIECE_NUMS = ['①', '②', '③', '④'];
    function pieceEmoji(team, idx) {
      return (team === 'A' ? '🔵' : '🔴') + PIECE_NUMS[idx];
    }

    async function lockGame() {
      state.gameLocked = true;
      updateGameStatusBadge();
      document.getElementById('board').classList.add('locked');
      await showBanner("🏆 GAME OVER!", 'gameover', 2500);
      declareWinner();
    }

    function declareWinner() {
      const aTotal = state.teamA.pieces.reduce((s, p) => s + p, 0) + (state.teamA.treasures * 25);
      const bTotal = state.teamB.pieces.reduce((s, p) => s + p, 0) + (state.teamB.treasures * 25);
      const aPanel = document.getElementById('teamAPanel');
      const bPanel = document.getElementById('teamBPanel');
      aPanel.classList.remove('active', 'winner');
      bPanel.classList.remove('active', 'winner');
      let winText = '';
      if (aTotal > bTotal) { aPanel.classList.add('winner'); winText = `🏆 TEAM A WINS! ${aTotal} vs ${bTotal}`; }
      else if (bTotal > aTotal) { bPanel.classList.add('winner'); winText = `🏆 TEAM B WINS! ${bTotal} vs ${aTotal}`; }
      else { winText = `🤝 DRAW! ${aTotal} – ${bTotal}`; aPanel.classList.add('winner'); bPanel.classList.add('winner'); }
      setTimeout(() => showBanner(winText, 'winner', 4000), 200);
    }

    function updateGameStatusBadge() {
      const badge = document.getElementById('gameStatusBadge');
      badge.classList.remove('hidden', 'game-over');
      if (state.gameLocked) { badge.textContent = '🏆 Game Over'; badge.classList.add('game-over'); }
      else badge.classList.add('hidden');
    }

    function getCellNumberAt(visualRow, visualCol) {
      const rowFromBottom = 4 - visualRow;
      const rowStart = rowFromBottom * 5 + 1;
      if (rowFromBottom % 2 === 0) return rowStart + visualCol;
      return rowStart + (4 - visualCol);
    }
    function getCellCoords(cellNum) {
      const rowFromBottom = Math.floor((cellNum - 1) / 5);
      const visualRow = 4 - rowFromBottom;
      const posInRow = (cellNum - 1) % 5;
      const visualCol = (rowFromBottom % 2 === 0) ? posInRow : 4 - posInRow;
      return { visualRow, visualCol };
    }
    function getCellCenter(cellNum) {
      const { visualRow, visualCol } = getCellCoords(cellNum);
      const cellSize = 1000 / 5;
      return {
        x: visualCol * cellSize + cellSize / 2,
        y: visualRow * cellSize + cellSize / 2
      };
    }
    // Get a point near the EDGE of cell toward the destination — keeps center clear for pieces
    function getEdgePoint(fromCell, toCell, edgeBias = 0.35) {
      const from = getCellCenter(fromCell);
      const to = getCellCenter(toCell);
      return {
        x: from.x + (to.x - from.x) * edgeBias,
        y: from.y + (to.y - from.y) * edgeBias
      };
    }

    const board = document.getElementById('board');
    const cellElements = {};
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cellNum = getCellNumberAt(r, c);
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (cellNum === 1) cell.classList.add('start');
        if (cellNum === 25) cell.classList.add('goal');
        cell.innerHTML = `
          <div class="cell-number">${cellNum}</div>
          <div class="pieces" id="pieces-${cellNum}"></div>
        `;
        board.appendChild(cell);
        cellElements[cellNum] = cell;
      }
    }

    function renderPieces() {
      for (let i = 1; i <= 25; i++) document.getElementById(`pieces-${i}`).innerHTML = '';
      state.teamA.pieces.forEach((pos, idx) => {
        document.getElementById(`pieces-${pos}`).innerHTML += `<span class="piece">${pieceEmoji('A', idx)}</span>`;
      });
      state.teamB.pieces.forEach((pos, idx) => {
        document.getElementById(`pieces-${pos}`).innerHTML += `<span class="piece">${pieceEmoji('B', idx)}</span>`;
      });
      updateScores();
    }

    // Find all snakes from cell (with team info)
    function getAllSnakesFrom(cellNum) {
      const snakes = [];
      for (const team of ['A', 'B']) {
        state.items[team].snakes.forEach(s => {
          if (s.from === cellNum) snakes.push({ team, ...s });
        });
      }
      return snakes;
    }
    function findBestSnakeFrom(cellNum) {
      const all = getAllSnakesFrom(cellNum);
      if (all.length === 0) return null;
      return all.reduce((best, s) => (s.to > best.to ? s : best), all[0]);
    }
    function findPitfallFrom(cellNum) {
      for (const team of ['A', 'B']) {
        const f = state.items[team].pitfalls.find(p => p.from === cellNum);
        if (f) return { team, ...f };
      }
      return null;
    }
    function getTreasureTeamAt(cellNum) {
      if (state.revealed.treasures.has(cellNum)) return null;
      for (const team of ['A', 'B']) {
        if (state.items[team].treasures.includes(cellNum)) return team;
      }
      return null;
    }
    function isTreasureAt(cellNum) {
      return getTreasureTeamAt(cellNum) !== null;
    }

    function renderRevealedItems() {
      const svg = document.getElementById('arrowSvg');
      const oldDrawings = svg.querySelectorAll('.arrow-line');
      oldDrawings.forEach(a => a.remove());

      state.revealed.snakes.forEach(fromCell => {
        const snakes = getAllSnakesFrom(fromCell);
        snakes.forEach(s => drawCuteSnake(fromCell, s.to, s.team));
      });
      state.revealed.pitfalls.forEach(fromCell => {
        const item = findPitfallFrom(fromCell);
        if (item) drawCutePitfall(fromCell, item.to, item.team);
      });
    }

    // === Snake drawing with team color and edge offset ===
    function drawCuteSnake(fromCell, toCell, team) {
      const colors = TEAM_COLORS[team];
      // Offset endpoints toward edge (keep center clear for pieces)
      const fromEdge = getEdgePoint(fromCell, toCell, 0.32);
      const toEdge = getEdgePoint(toCell, fromCell, 0.32);
      const svg = document.getElementById('arrowSvg');
      const SVG_NS = 'http://www.w3.org/2000/svg';

      const dx = toEdge.x - fromEdge.x;
      const dy = toEdge.y - fromEdge.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const perpX = -dy / dist;
      const perpY = dx / dist;
      const wave = Math.min(dist * 0.35, 50);
      const ctrl1X = fromEdge.x + dx * 0.3 + perpX * wave;
      const ctrl1Y = fromEdge.y + dy * 0.3 + perpY * wave;
      const ctrl2X = fromEdge.x + dx * 0.7 - perpX * wave;
      const ctrl2Y = fromEdge.y + dy * 0.7 - perpY * wave;
      const pathD = `M ${fromEdge.x} ${fromEdge.y} C ${ctrl1X} ${ctrl1Y}, ${ctrl2X} ${ctrl2Y}, ${toEdge.x} ${toEdge.y}`;

      // Layered body
      [
        { color: colors.snakeOuter, width: 22 },
        { color: colors.snakeMain, width: 16 },
        { color: colors.snakeInner, width: 7, opacity: 0.7 }
      ].forEach(({ color, width, opacity }) => {
        const p = document.createElementNS(SVG_NS, 'path');
        p.classList.add('arrow-line', 'snake-body');
        p.setAttribute('d', pathD);
        p.setAttribute('stroke', color);
        p.setAttribute('stroke-width', width);
        p.setAttribute('stroke-linecap', 'round');
        p.setAttribute('fill', 'none');
        if (opacity) p.setAttribute('opacity', opacity);
        svg.appendChild(p);
      });

      // Smaller head
      const head = document.createElementNS(SVG_NS, 'circle');
      head.classList.add('arrow-line', 'snake-head');
      head.setAttribute('cx', toEdge.x); head.setAttribute('cy', toEdge.y);
      head.setAttribute('r', '20');
      head.setAttribute('fill', `url(#${colors.snakeHeadGrad})`);
      head.setAttribute('stroke', colors.snakeOuter); head.setAttribute('stroke-width', '2');
      svg.appendChild(head);

      // Smaller tail
      const tail = document.createElementNS(SVG_NS, 'circle');
      tail.classList.add('arrow-line');
      tail.setAttribute('cx', fromEdge.x); tail.setAttribute('cy', fromEdge.y);
      tail.setAttribute('r', '10'); tail.setAttribute('fill', colors.snakeOuter);
      svg.appendChild(tail);

      // Smaller eyes
      [[-7, -6], [7, -6]].forEach(([ox, oy]) => {
        const eye = document.createElementNS(SVG_NS, 'circle');
        eye.classList.add('arrow-line');
        eye.setAttribute('cx', toEdge.x + ox); eye.setAttribute('cy', toEdge.y + oy);
        eye.setAttribute('r', '4'); eye.setAttribute('fill', 'white');
        svg.appendChild(eye);
        const pup = document.createElementNS(SVG_NS, 'circle');
        pup.classList.add('arrow-line');
        pup.setAttribute('cx', toEdge.x + ox + 1); pup.setAttribute('cy', toEdge.y + oy + 1);
        pup.setAttribute('r', '2'); pup.setAttribute('fill', '#000');
        svg.appendChild(pup);
      });

      // Smaller tongue
      const tongue = document.createElementNS(SVG_NS, 'path');
      tongue.classList.add('arrow-line', 'snake-tongue');
      tongue.setAttribute('d',
        `M ${toEdge.x} ${toEdge.y + 8} L ${toEdge.x} ${toEdge.y + 16}
         M ${toEdge.x} ${toEdge.y + 16} L ${toEdge.x - 4} ${toEdge.y + 20}
         M ${toEdge.x} ${toEdge.y + 16} L ${toEdge.x + 4} ${toEdge.y + 20}`);
      tongue.setAttribute('stroke', '#ff4d8d');
      tongue.setAttribute('stroke-width', '2');
      tongue.setAttribute('stroke-linecap', 'round');
      tongue.setAttribute('fill', 'none');
      svg.appendChild(tongue);
    }

    // === Pitfall drawing with team color and edge offset ===
    function drawCutePitfall(fromCell, toCell, team) {
      const colors = TEAM_COLORS[team];
      const fromEdge = getEdgePoint(fromCell, toCell, 0.30);
      const toEdge = getEdgePoint(toCell, fromCell, 0.30);
      const svg = document.getElementById('arrowSvg');
      const SVG_NS = 'http://www.w3.org/2000/svg';

      [fromEdge, toEdge].forEach(p => {
        // Smaller pit
        const rim = document.createElementNS(SVG_NS, 'ellipse');
        rim.classList.add('arrow-line', 'pit-hole');
        rim.setAttribute('cx', p.x); rim.setAttribute('cy', p.y);
        rim.setAttribute('rx', '34'); rim.setAttribute('ry', '13');
        rim.setAttribute('fill', colors.pitRimDark);
        rim.setAttribute('stroke', colors.pitRim);
        rim.setAttribute('stroke-width', '3');
        svg.appendChild(rim);

        const hole = document.createElementNS(SVG_NS, 'ellipse');
        hole.classList.add('arrow-line', 'pit-hole');
        hole.setAttribute('cx', p.x); hole.setAttribute('cy', p.y);
        hole.setAttribute('rx', '26'); hole.setAttribute('ry', '9');
        hole.setAttribute('fill', 'url(#pitGrad)');
        svg.appendChild(hole);

        const deep = document.createElementNS(SVG_NS, 'ellipse');
        deep.classList.add('arrow-line');
        deep.setAttribute('cx', p.x); deep.setAttribute('cy', p.y);
        deep.setAttribute('rx', '17'); deep.setAttribute('ry', '5');
        deep.setAttribute('fill', '#000');
        svg.appendChild(deep);
      });

      const fallLine = document.createElementNS(SVG_NS, 'line');
      fallLine.classList.add('arrow-line', 'fall-trajectory');
      fallLine.setAttribute('x1', fromEdge.x); fallLine.setAttribute('y1', fromEdge.y + 10);
      fallLine.setAttribute('x2', toEdge.x); fallLine.setAttribute('y2', toEdge.y - 10);
      fallLine.setAttribute('stroke', colors.fallLine);
      fallLine.setAttribute('stroke-width', '4');
      fallLine.setAttribute('stroke-dasharray', '8,7');
      fallLine.setAttribute('stroke-linecap', 'round');
      svg.appendChild(fallLine);
    }

    function updateScores() {
      const aPieces = state.teamA.pieces.reduce((s, p) => s + p, 0);
      const bPieces = state.teamB.pieces.reduce((s, p) => s + p, 0);
      const aTotal = aPieces + (state.teamA.treasures * 25);
      const bTotal = bPieces + (state.teamB.treasures * 25);
      const aText = state.teamA.pieces.map((p, i) => `${PIECE_NUMS[i]}${p}`).join(' ');
      const bText = state.teamB.pieces.map((p, i) => `${PIECE_NUMS[i]}${p}`).join(' ');
      document.getElementById('teamAPieces').textContent = aText;
      document.getElementById('teamBPieces').textContent = bText;
      document.getElementById('teamATreasures').textContent = state.teamA.treasures;
      document.getElementById('teamBTreasures').textContent = state.teamB.treasures;
      document.getElementById('teamAPieceScore').textContent = aPieces;
      document.getElementById('teamBPieceScore').textContent = bPieces;
      document.getElementById('teamATotal').textContent = aTotal;
      document.getElementById('teamBTotal').textContent = bTotal;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function showBanner(text, type, duration = 1500) {
      const banner = document.getElementById('bigBanner');
      banner.textContent = text;
      banner.className = type;
      banner.classList.add('show');
      await sleep(duration);
      banner.classList.remove('show');
      await sleep(200);
    }

    async function showDice(value) {
      const diceEl = document.getElementById('diceDisplay');
      const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄'];
      diceEl.textContent = diceFaces[value - 1] || '🎲';
      diceEl.classList.add('show');
      await sleep(1100);
      diceEl.classList.remove('show');
      await sleep(250);
    }

    async function diceWalk(team, pieceIdx, steps) {
      let currentPos = state[`team${team}`].pieces[pieceIdx];
      for (let i = 0; i < steps; i++) {
        currentPos = Math.min(currentPos + 1, 25);
        state[`team${team}`].pieces[pieceIdx] = currentPos;
        renderPieces();
        const cell = cellElements[currentPos];
        cell.classList.add('highlight');
        await sleep(300);
        cell.classList.remove('highlight');
        if (currentPos === 25) break;
      }
      return currentPos;
    }

    async function triggerChain(team, pieceIdx, landedCell) {
      const entryCell = landedCell;
      const visitedCells = new Set([landedCell]);
      let currentCell = landedCell;
      let chainCount = 0;
      const maxChain = 12;

      while (chainCount < maxChain) {
        chainCount++;

        // Treasure
        const treasureTeam = getTreasureTeamAt(currentCell);
        if (treasureTeam) {
          state.revealed.treasures.add(currentCell);
          state[`team${team}`].treasures++;
          const cell = cellElements[currentCell];
          cell.classList.add(`treasure-reveal-${treasureTeam.toLowerCase()}`);
          await showBanner(`💎 TREASURE! Team ${team} +25 pts (was Team ${treasureTeam}'s)`, `treasure-${treasureTeam.toLowerCase()}`, 1700);
          cell.classList.remove(`treasure-reveal-${treasureTeam.toLowerCase()}`);
          renderRevealedItems();
          updateScores();
        }

        const snake = findBestSnakeFrom(currentCell);
        const pitfall = findPitfallFrom(currentCell);

        // CONFLICT: snake AND pitfall → neutralized, no penalty, stay put
        if (snake && pitfall) {
          state.revealed.snakes.add(currentCell);
          state.revealed.pitfalls.add(currentCell);
          const cell = cellElements[currentCell];
          cell.classList.add('conflict-reveal');
          await showBanner(`⚖️ NEUTRALIZED at ${currentCell}!`, 'conflict', 2000);
          cell.classList.remove('conflict-reveal');
          renderRevealedItems();
          return;
        }

        if (snake) {
          state.revealed.snakes.add(currentCell);
          await showBanner(`🐍 SNAKE! ${currentCell} ↑ ${snake.to}`, `snake-${snake.team.toLowerCase()}`, 1400);
          renderRevealedItems();
          state[`team${team}`].pieces[pieceIdx] = snake.to;
          renderPieces();
          cellElements[snake.to].classList.add('highlight');
          await sleep(500);
          cellElements[snake.to].classList.remove('highlight');
          currentCell = snake.to;

          if (visitedCells.has(currentCell)) {
            await showBanner(`🔄 LOOP! Back to cell ${entryCell}`, 'loop', 2200);
            state[`team${team}`].pieces[pieceIdx] = entryCell;
            renderPieces();
            cellElements[entryCell].classList.add('highlight');
            await sleep(500);
            cellElements[entryCell].classList.remove('highlight');
            return;
          }
          visitedCells.add(currentCell);
          continue;
        }

        if (pitfall) {
          state.revealed.pitfalls.add(currentCell);
          await showBanner(`🕳️ PITFALL! ${currentCell} ↓ ${pitfall.to}`, `pitfall-${pitfall.team.toLowerCase()}`, 1400);
          renderRevealedItems();
          state[`team${team}`].pieces[pieceIdx] = pitfall.to;
          renderPieces();
          cellElements[pitfall.to].classList.add('highlight');
          await sleep(500);
          cellElements[pitfall.to].classList.remove('highlight');
          currentCell = pitfall.to;

          if (visitedCells.has(currentCell)) {
            await showBanner(`🔄 LOOP! Back to cell ${entryCell}`, 'loop', 2200);
            state[`team${team}`].pieces[pieceIdx] = entryCell;
            renderPieces();
            cellElements[entryCell].classList.add('highlight');
            await sleep(500);
            cellElements[entryCell].classList.remove('highlight');
            return;
          }
          visitedCells.add(currentCell);
          continue;
        }

        break;
      }

      if (currentCell === 25) {
        await showBanner(`🏁 ${pieceEmoji(team, pieceIdx)} reached the GOAL!`, 'goal', 1500);
      }
    }

    function checkAllPiecesAtGoal(team) {
      return state[`team${team}`].pieces.every(p => p === 25);
    }

    function updateTurn() {
      const indicator = document.getElementById('turnIndicator');
      const aPanel = document.getElementById('teamAPanel');
      const bPanel = document.getElementById('teamBPanel');
      if (state.currentTurn === 'A') {
        indicator.innerHTML = '🔵 Team A';
        indicator.className = 'team-a-color';
        if (!state.gameLocked) { aPanel.classList.add('active'); bPanel.classList.remove('active'); }
      } else {
        indicator.innerHTML = '🔴 Team B';
        indicator.className = 'team-b-color';
        if (!state.gameLocked) { bPanel.classList.add('active'); aPanel.classList.remove('active'); }
      }
    }

    function updatePhase() {
      const banner = document.getElementById('phaseBanner');
      const boardWrap = document.getElementById('boardWrapper');
      const score = document.getElementById('scorePanel');
      const legend = document.getElementById('legend');
      if (state.phase === 'setup') {
        banner.classList.remove('hidden');
        boardWrap.classList.add('hidden');
        score.classList.add('hidden');
        legend.classList.add('hidden');
      } else {
        banner.classList.add('hidden');
        boardWrap.classList.remove('hidden');
        score.classList.remove('hidden');
        legend.classList.remove('hidden');
      }
      updateGameStatusBadge();
    }

    renderPieces();
    updateTurn();
    updatePhase();

    const ROOM_ID = 'snake-pitfall-2026-display';
    const statusEl = document.getElementById('status');
    const peer = new Peer(ROOM_ID, { debug: 2 });
    peer.on('open', () => { statusEl.textContent = '✅ Ready'; });
    peer.on('connection', (conn) => {
      statusEl.textContent = '🟢 GM Connected';
      statusEl.className = 'connected';
      conn.on('data', async (msg) => {
        console.log('Received:', msg);
        await handleAction(msg);
      });
      conn.on('close', () => {
        statusEl.textContent = '⚠️ GM disconnected';
        statusEl.className = 'waiting';
      });
    });
    peer.on('error', (err) => { statusEl.textContent = '❌ ' + err.type; });

    async function handleAction(msg) {
      switch (msg.type) {
        case 'movePiece':
          if (state.gameLocked) return;
          await showDice(msg.dice);
          const landedCell = await diceWalk(msg.team, msg.pieceIdx, msg.dice);
          await sleep(200);
          await triggerChain(msg.team, msg.pieceIdx, landedCell);
          if (checkAllPiecesAtGoal(msg.team)) {
            await showBanner(`🏆 Team ${msg.team} got all 4 pieces to GOAL!`, 'winner', 3000);
          }
          break;
        case 'switchTurn':
          if (state.gameLocked) return;
          state.currentTurn = state.currentTurn === 'A' ? 'B' : 'A';
          updateTurn();
          break;
        case 'reset':
          state.teamA = { pieces: [1, 1, 1, 1], treasures: 0 };
          state.teamB = { pieces: [1, 1, 1, 1], treasures: 0 };
          state.currentTurn = 'A';
          state.phase = 'setup';
          state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
          state.gameLocked = false;
          document.getElementById('board').classList.remove('locked');
          document.getElementById('teamAPanel').classList.remove('winner');
          document.getElementById('teamBPanel').classList.remove('winner');
          renderPieces();
          renderRevealedItems();
          updateTurn();
          updatePhase();
          break;
        case 'startGame':
          state.phase = 'playing';
          if (msg.items) state.items = msg.items;
          state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
          state.gameLocked = false;
          document.getElementById('board').classList.remove('locked');
          document.getElementById('teamAPanel').classList.remove('winner');
          document.getElementById('teamBPanel').classList.remove('winner');
          renderRevealedItems();
          updatePhase();
          break;
        case 'setupMode':
          state.phase = 'setup';
          updatePhase();
          break;
        case 'endGameNow':
          if (!state.gameLocked) await lockGame();
          break;
      }
    }
  </script>
</body>
</html>
