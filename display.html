<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake & Pitfall — Display</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
    }
    /* Subtle background poster during play */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('poster.png') center/cover no-repeat;
      opacity: 0;
      filter: blur(8px) brightness(0.4);
      z-index: -1;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    body.playing::before {
      opacity: 0.5;
    }
    
    /* === Animated background snakes during play === */
    #bgSnakes {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      transition: opacity 1s ease;
      overflow: hidden;
    }
    body.playing #bgSnakes { opacity: 1; }
    
    .bg-snake {
      position: absolute;
      filter: blur(8px);
      opacity: 0.35;
      animation: bgDrift 30s linear infinite, bgWiggle 4s ease-in-out infinite;
    }
    .bg-snake.green { fill: #27ae60; }
    .bg-snake.purple { fill: #9b59b6; }
    
    @keyframes bgDrift {
      0% { transform: translate(-150px, 0) rotate(0deg); }
      50% { transform: translate(50vw, 30vh) rotate(180deg); }
      100% { transform: translate(100vw, 60vh) rotate(360deg); }
    }
    @keyframes bgWiggle {
      0%, 100% { filter: blur(8px); }
      50% { filter: blur(12px); }
    }

    h1 {
      font-size: 2.3em;
      margin: 8px 0;
      text-shadow: 0 2px 10px rgba(74, 144, 226, 0.5);
    }
    #topBar {
      display: flex;
      gap: 30px;
      align-items: center;
      font-size: 1.2em;
      margin-bottom: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #status { padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    .waiting { background: #ff9800; }
    .connected { background: #4caf50; }

    /* Mute button */
    #muteBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      font-size: 1.5em;
      cursor: pointer;
      z-index: 300;
      transition: all 0.2s;
    }
    #muteBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.08); }
    #muteBtn.muted { opacity: 0.6; }

    #gameStatusBadge {
      font-size: 1.3em; font-weight: bold;
      padding: 8px 18px; border-radius: 10px;
    }
    #gameStatusBadge.hidden { display: none; }
    #gameStatusBadge.game-over { background: rgba(212, 175, 55, 0.5); border: 2px solid #d4af37; }

    /* === Welcome / Setup Splash with Poster === */
    #welcomeSplash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
      margin: 20px 0;
      text-align: center;
    }
    #welcomeSplash.hidden { display: none; }
    #posterImg {
      max-width: min(80vh, 90vw);
      max-height: 75vh;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: posterFloat 4s ease-in-out infinite;
    }
    @keyframes posterFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.01); }
    }
    .setup-overlay-text {
      font-size: 1.8em;
      padding: 18px 36px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 16px;
      border: 2px solid rgba(212, 175, 55, 0.6);
      animation: pulse 2s infinite;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

    #boardWrapper {
      position: relative;
      width: min(65vh, 88vw);
      aspect-ratio: 1 / 1;
    }
    #boardWrapper.hidden { display: none; }
    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 5px;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
    }
    #board.locked { opacity: 0.85; pointer-events: none; }
    #arrowSvg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    .cell {
      background: linear-gradient(145deg, #2a3568, #1e2850);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
      transition: background 0.3s;
      overflow: hidden;
      padding: 4px;
    }
    .cell.start { background: linear-gradient(145deg, #2d7a3d, #1f5a2c); }
    .cell.goal { background: linear-gradient(145deg, #d4af37, #b8941f); color: #0a0e27; }
    .cell-number {
      position: absolute;
      top: 3px; left: 5px;
      font-size: 0.85em;
      opacity: 0.7;
      z-index: 4;
    }
    .pieces {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      font-size: 1.2em;
      z-index: 10;
      max-width: 100%;
      position: relative;
    }
    .piece {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.6em;
      line-height: 1;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.9));
    }

    .cell.highlight {
      background: linear-gradient(145deg, #f39c12, #d68910) !important;
      animation: flash 0.4s ease;
    }
    .cell.snake-reveal { animation: revealFlash 0.6s ease; }
    .cell.pitfall-reveal { animation: revealFlash 0.6s ease; }
    .cell.treasure-reveal-a { background: linear-gradient(145deg, #d4af37, #f1c40f) !important; animation: revealFlash 0.6s ease; }
    .cell.treasure-reveal-b { background: linear-gradient(145deg, #1abc9c, #16a085) !important; animation: revealFlash 0.6s ease; }
    .cell.conflict-reveal { background: linear-gradient(145deg, #8e44ad, #6c3483) !important; animation: revealFlash 0.6s ease; }
    @keyframes flash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes revealFlash {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); box-shadow: 0 0 30px rgba(255,255,255,0.9); }
      100% { transform: scale(1); }
    }

    .snake-body { animation: snakeWiggle 2s infinite ease-in-out; }
    @keyframes snakeWiggle { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    .snake-head { animation: headBob 1.5s infinite ease-in-out; transform-origin: center; transform-box: fill-box; }
    @keyframes headBob { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .snake-tongue { animation: tongueFlick 0.8s infinite; }
    @keyframes tongueFlick { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pit-hole { animation: pitPulse 2s infinite ease-in-out; }
    @keyframes pitPulse { 0%, 100% { opacity: 0.95; } 50% { opacity: 0.7; } }
    .fall-trajectory { animation: fallShimmer 1.5s infinite; }
    @keyframes fallShimmer { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

    /* === Scorecards === */
    #scorePanel {
      display: flex;
      gap: 30px;
      margin-top: 18px;
      font-size: 1.1em;
    }
    #scorePanel.hidden { display: none; }
    .team-card {
      padding: 14px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      min-width: 320px;
      text-align: center;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .team-card.active {
      background: rgba(255, 215, 0, 0.18);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }
    .team-card.winner {
      background: rgba(76, 175, 80, 0.35);
      box-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
      transform: scale(1.1);
      border-color: #4caf50;
    }
    .team-card.team-a { border-color: rgba(74, 144, 226, 0.6); }
    .team-card.team-b { border-color: rgba(231, 76, 60, 0.6); }
    .team-card .team-name {
      font-size: 1.4em;
      font-weight: bold;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .team-card.team-a .team-name { color: #4a90e2; text-shadow: 0 0 8px rgba(74,144,226,0.4); }
    .team-card.team-b .team-name { color: #e74c3c; text-shadow: 0 0 8px rgba(231,76,60,0.4); }
    .piece-positions { font-size: 0.95em; margin-bottom: 4px; }
    .breakdown { font-size: 0.85em; opacity: 0.9; margin-bottom: 6px; }
    .total { font-size: 1.7em; font-weight: bold; }

    .legend-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: flex-end;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .legend-icon-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      position: relative;
    }
    .legend-icon-wrapper svg {
      width: 38px;
      height: 38px;
    }
    .legend-icon-wrapper .legend-label {
      font-size: 0.7em;
      opacity: 0.85;
    }
    /* Treasure count badge */
    .treasure-wrapper {
      position: relative;
    }
    .treasure-count-badge {
      position: absolute;
      top: -8px;
      right: -10px;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      background: #e74c3c;
      color: white;
      border: 2px solid white;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 5;
      transition: transform 0.3s;
    }
    .treasure-count-badge.zero { background: #666; border-color: rgba(255,255,255,0.4); opacity: 0.7; }
    .treasure-count-badge.pop {
      animation: badgePop 0.6s ease;
    }
    @keyframes badgePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.6); background: #ffd700; color: #1a1f3a; }
      100% { transform: scale(1); }
    }

    /* Floating +25 animation */
    .floating-points {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd700;
      font-size: 1.4em;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      pointer-events: none;
      opacity: 0;
      animation: floatUp 1.8s ease forwards;
      z-index: 100;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); }
      20% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
      80% { opacity: 1; transform: translate(-50%, -50px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -70px) scale(0.8); }
    }

    .turn-indicator-a { color: #4a90e2; text-shadow: 0 0 6px rgba(74,144,226,0.5); font-weight: bold; }
    .turn-indicator-b { color: #e74c3c; text-shadow: 0 0 6px rgba(231,76,60,0.5); font-weight: bold; }

    #bigBanner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.3em;
      background: white;
      color: #0a0e27;
      padding: 30px 60px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.4s ease;
      z-index: 200;
      text-align: center;
    }
    #bigBanner.show { transform: translate(-50%, -50%) scale(1); }
    #bigBanner.snake-a { background: #27ae60; color: white; }
    #bigBanner.snake-b { background: #9b59b6; color: white; }
    #bigBanner.pitfall-a { background: #c0392b; color: white; }
    #bigBanner.pitfall-b { background: #e67e22; color: white; }
    #bigBanner.treasure-a { background: #d4af37; color: #1a1f3a; }
    #bigBanner.treasure-b { background: #1abc9c; color: white; }
    #bigBanner.loop { background: #9b59b6; color: white; }
    #bigBanner.conflict { background: #8e44ad; color: white; }
    #bigBanner.goal { background: #f39c12; color: white; }
    #bigBanner.gameover { background: #d4af37; color: #1a1f3a; font-size: 3.5em; }
    #bigBanner.winner {
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      color: #1a1f3a;
      font-size: 3.2em;
    }

    #diceDisplay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 7em;
      background: white;
      color: #0a0e27;
      width: 180px; height: 180px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #diceDisplay.show { transform: translate(-50%, -50%) scale(1); }

    /* Game Over splash */
    #gameOverSplash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 250;
      gap: 30px;
    }
    #gameOverSplash.show { display: flex; }
    #gameOverSplash img {
      max-height: 50vh;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(255,215,0,0.4);
    }
    #gameOverSplash .winner-text {
      font-size: 3em;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1f3a;
      padding: 20px 50px;
      border-radius: 16px;
      text-align: center;
    }
  </style>
</head>

  <!-- Audio elements -->
  <audio id="sndDice" src="sounds/dice.mp3" preload="auto"></audio>
  <audio id="sndSnake" src="sounds/snake.mp3" preload="auto"></audio>
  <audio id="sndPitfall" src="sounds/pitfall.mp3" preload="auto"></audio>
  <audio id="sndTreasure" src="sounds/treasure.mp3" preload="auto"></audio>
  <audio id="sndConflict" src="sounds/conflict.mp3" preload="auto"></audio>
  <audio id="sndLoop" src="sounds/loop.mp3" preload="auto"></audio>

  <audio id="sndGameover" src="sounds/gameover.mp3" preload="auto"></audio>
  <audio id="sndWinner" src="sounds/winner.mp3" preload="auto"></audio>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    // ===== Audio system =====
    let isMuted = false;
    function playSound(id, volume = 0.8) {
      if (isMuted) return;
      const el = document.getElementById(id);
      if (!el) return;
      try {
        el.currentTime = 0;
        el.volume = volume;
        const p = el.play();
        if (p && p.catch) p.catch(() => {}); // ignore autoplay blocks
      } catch (e) {}
    }
    function playBgMusic() {
  if (isMuted) return;
  const el = document.getElementById('sndBgMusic');
  if (!el) return;
  el.volume = 0.25; // softer than SFX so it doesn't drown them out
  const p = el.play();
  if (p && p.catch) p.catch(() => {}); // ignore autoplay blocks
}

function stopBgMusic() {
  const el = document.getElementById('sndBgMusic');
  if (!el) return;
  try {
    el.pause();
    el.currentTime = 0;
  } catch (e) {}
}

function pauseBgMusic() {
  const el = document.getElementById('sndBgMusic');
  if (!el) return;
  try { el.pause(); } catch (e) {}
}
`
    function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  const music = document.getElementById('sndBgMusic');
  if (isMuted) {
    btn.textContent = '🔇';
    btn.classList.add('muted');
    if (music) music.muted = true;
  } else {
    btn.textContent = '🔊';
    btn.classList.remove('muted');
    if (music) music.muted = false;
  }
}
    // Unlock audio on first user interaction (browsers require this)
    document.body.addEventListener('click', () => {
      ['sndDice','sndSnake','sndPitfall','sndTreasure','sndConflict','sndLoop','sndGoal','sndGameover','sndWinner','sndFootsteps'].forEach(id => {
        const a = document.getElementById(id);
        if (a) { a.volume = 0; a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {}); }
      });
    }, { once: true });

    const TEAM_COLORS = {
      A: {

        snakeHeadGrad: 'snakeHeadGradA',
        pitRim: '#8b4513', pitRimDark: '#5d4037',
        fallLine: '#c0392b',
        treasureFill: '#ffd700', treasureStroke: '#b8941f'
      },
      B: {
        snakeOuter: '#6c3483', snakeMain: '#9b59b6', snakeInner: '#d2a8e8',
        snakeHeadGrad: 'snakeHeadGradB',

        fallLine: '#e67e22',
        treasureFill: '#1abc9c', treasureStroke: '#0e8a6f'
      }
    };

    const state = {
      phase: 'setup',
      teamA: { pieces: [1, 1, 1, 1], treasures: 0, name: 'Team A' },
      teamB: { pieces: [1, 1, 1, 1], treasures: 0, name: 'Team B' },
      currentTurn: 'A',
      items: {
        A: { snakes: [], pitfalls: [], treasures: [] },
        B: { snakes: [], pitfalls: [], treasures: [] }
      },
      revealed: { snakes: new Set(), pitfalls: new Set(), treasures: new Set() },
      gameLocked: false
    };

    const PIECE_NUMS = ['①', '②', '③', '④'];
    function pieceEmoji(team, idx) {
      return (team === 'A' ? '🔵' : '🔴') + PIECE_NUMS[idx];
    }

    async function lockGame() {
      state.gameLocked = true;
      updateGameStatusBadge();
      document.getElementById('board').classList.add('locked');
      playSound('sndGameover');
      await showBanner("🏆 GAME OVER!", 'gameover', 2500);
      declareWinner();
    }

    function declareWinner() {
  const aTotal = state.teamA.pieces.reduce((s, p) => s + p, 0) + (state.teamA.treasures * 25);
  const bTotal = state.teamB.pieces.reduce((s, p) => s + p, 0) + (state.teamB.treasures * 25);
  const aPanel = document.getElementById('teamAPanel');
  const bPanel = document.getElementById('teamBPanel');
  aPanel.classList.remove('active', 'winner');
  bPanel.classList.remove('active', 'winner');
  let winText = '';
  if (aTotal > bTotal) {
    aPanel.classList.add('winner');
    winText = '\u{1F3C6} ' + state.teamA.name + ' WINS! ' + aTotal + ' vs ' + bTotal;
  } else if (bTotal > aTotal) {
    bPanel.classList.add('winner');
    winText = '\u{1F3C6} ' + state.teamB.name + ' WINS! ' + bTotal + ' vs ' + aTotal;
  } else {
    winText = '\u{1F91D} DRAW! ' + aTotal + ' - ' + bTotal;
    aPanel.classList.add('winner');
    bPanel.classList.add('winner');
  }
  setTimeout(function() {
    playSound('sndWinner');
    showBanner(winText, 'winner', 4000);
    document.getElementById('gameOverWinner').textContent = winText;
    document.getElementById('gameOverSplash').classList.add('show');
  }, 200);
}

    function updateGameStatusBadge() {
      const badge = document.getElementById('gameStatusBadge');
      badge.classList.remove('hidden', 'game-over');
      if (state.gameLocked) { badge.textContent = '🏆 Game Over'; badge.classList.add('game-over'); }
      else badge.classList.add('hidden');
    }

    function getCellNumberAt(visualRow, visualCol) {
      const rowFromBottom = 4 - visualRow;
      const rowStart = rowFromBottom * 5 + 1;
      if (rowFromBottom % 2 === 0) return rowStart + visualCol;
      return rowStart + (4 - visualCol);
    }
    function getCellCoords(cellNum) {
      const rowFromBottom = Math.floor((cellNum - 1) / 5);
      const visualRow = 4 - rowFromBottom;
      const posInRow = (cellNum - 1) % 5;
      const visualCol = (rowFromBottom % 2 === 0) ? posInRow : 4 - posInRow;
      return { visualRow, visualCol };
    }
    function getCellCenter(cellNum) {
      const { visualRow, visualCol } = getCellCoords(cellNum);
      const cellSize = 1000 / 5;
      return { x: visualCol * cellSize + cellSize / 2, y: visualRow * cellSize + cellSize / 2 };
    }
    function getEdgePoint(fromCell, toCell, edgeBias = 0.35) {
      const from = getCellCenter(fromCell);
      const to = getCellCenter(toCell);
      return {
        x: from.x + (to.x - from.x) * edgeBias,
        y: from.y + (to.y - from.y) * edgeBias
      };
    }

    const board = document.getElementById('board');
const cellElements = {};
for (let r = 0; r < 5; r++) {
  for (let c = 0; c < 5; c++) {
    const cellNum = getCellNumberAt(r, c);
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (cellNum === 1) cell.classList.add('start');
    if (cellNum === 25) cell.classList.add('goal');
    cell.innerHTML =
      '<div class="cell-number">' + cellNum + '</div>' +
      '<div class="pieces" id="pieces-' + cellNum + '"></div>';
    board.appendChild(cell);
    cellElements[cellNum] = cell;
  }
}

    function renderPieces() {
  for (let i = 1; i <= 25; i++) {
    document.getElementById('pieces-' + i).innerHTML = '';
  }
  state.teamA.pieces.forEach(function(pos, idx) {
    document.getElementById('pieces-' + pos).innerHTML +=
      '<span class="piece">' + pieceEmoji('A', idx) + '</span>';
  });
  state.teamB.pieces.forEach(function(pos, idx) {
    document.getElementById('pieces-' + pos).innerHTML +=
      '<span class="piece">' + pieceEmoji('B', idx) + '</span>';
  });
  updateScores();
}

    function getAllSnakesFrom(cellNum) {
  const snakes = [];
  for (const team of ['A', 'B']) {
    state.items[team].snakes.forEach(function(s) {
      if (s.from === cellNum) snakes.push(Object.assign({ team: team }, s));
    });
  }
  return snakes;
}
function findBestSnakeFrom(cellNum) {
  const all = getAllSnakesFrom(cellNum);
  if (all.length === 0) return null;
  return all.reduce(function(best, s) { return s.to > best.to ? s : best; }, all[0]);
}
function findPitfallFrom(cellNum) {
  for (const team of ['A', 'B']) {
    const f = state.items[team].pitfalls.find(function(p) { return p.from === cellNum; });
    if (f) return Object.assign({ team: team }, f);
  }
  return null;
}
function getTreasureTeamAt(cellNum) {
  if (state.revealed.treasures.has(cellNum)) return null;
  for (const team of ['A', 'B']) {
    if (state.items[team].treasures.includes(cellNum)) return team;
  }
  return null;
}

function renderRevealedItems() {
  const svg = document.getElementById('arrowSvg');
  svg.querySelectorAll('.arrow-line').forEach(function(a) { a.remove(); });

  state.revealed.snakes.forEach(function(fromCell) {
    const snakes = getAllSnakesFrom(fromCell);
    snakes.forEach(function(s) { drawCuteSnake(fromCell, s.to, s.team); });
  });
  state.revealed.pitfalls.forEach(function(fromCell) {
    const item = findPitfallFrom(fromCell);
    if (item) drawCutePitfall(fromCell, item.to, item.team);
  });
}

function drawCuteSnake(fromCell, toCell, team) {
  const colors = TEAM_COLORS[team];
  const fromEdge = getEdgePoint(fromCell, toCell, 0.32);
  const toEdge = getEdgePoint(toCell, fromCell, 0.32);
  const svg = document.getElementById('arrowSvg');
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const dx = toEdge.x - fromEdge.x;
  const dy = toEdge.y - fromEdge.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const perpX = -dy / dist;
  const perpY = dx / dist;
  const wave = Math.min(dist * 0.35, 50);
  const ctrl1X = fromEdge.x + dx * 0.3 + perpX * wave;
  const ctrl1Y = fromEdge.y + dy * 0.3 + perpY * wave;
  const ctrl2X = fromEdge.x + dx * 0.7 - perpX * wave;
  const ctrl2Y = fromEdge.y + dy * 0.7 - perpY * wave;
  const pathD = 'M ' + fromEdge.x + ' ' + fromEdge.y +
    ' C ' + ctrl1X + ' ' + ctrl1Y + ', ' + ctrl2X + ' ' + ctrl2Y +
    ', ' + toEdge.x + ' ' + toEdge.y;

  [
    { color: colors.snakeOuter, width: 22 },
    { color: colors.snakeMain, width: 16 },
    { color: colors.snakeInner, width: 7, opacity: 0.7 }
  ].forEach(function(item) {
    const p = document.createElementNS(SVG_NS, 'path');
    p.classList.add('arrow-line', 'snake-body');
    p.setAttribute('d', pathD);
    p.setAttribute('stroke', item.color);
    p.setAttribute('stroke-width', item.width);
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('fill', 'none');
    if (item.opacity) p.setAttribute('opacity', item.opacity);
    svg.appendChild(p);
  });

  const head = document.createElementNS(SVG_NS, 'circle');
  head.classList.add('arrow-line', 'snake-head');
  head.setAttribute('cx', toEdge.x); head.setAttribute('cy', toEdge.y);
  head.setAttribute('r', '20');
  head.setAttribute('fill', 'url(#' + colors.snakeHeadGrad + ')');
  head.setAttribute('stroke', colors.snakeOuter); head.setAttribute('stroke-width', '2');
  svg.appendChild(head);

  const tail = document.createElementNS(SVG_NS, 'circle');
  tail.classList.add('arrow-line');
  tail.setAttribute('cx', fromEdge.x); tail.setAttribute('cy', fromEdge.y);
  tail.setAttribute('r', '10'); tail.setAttribute('fill', colors.snakeOuter);
  svg.appendChild(tail);

  [[-7, -6], [7, -6]].forEach(function(arr) {
    const ox = arr[0], oy = arr[1];
    const eye = document.createElementNS(SVG_NS, 'circle');
    eye.classList.add('arrow-line');
    eye.setAttribute('cx', toEdge.x + ox); eye.setAttribute('cy', toEdge.y + oy);
    eye.setAttribute('r', '4'); eye.setAttribute('fill', 'white');
    svg.appendChild(eye);
    const pup = document.createElementNS(SVG_NS, 'circle');
    pup.classList.add('arrow-line');
    pup.setAttribute('cx', toEdge.x + ox + 1); pup.setAttribute('cy', toEdge.y + oy + 1);
    pup.setAttribute('r', '2'); pup.setAttribute('fill', '#000');
    svg.appendChild(pup);
  });

  const tongue = document.createElementNS(SVG_NS, 'path');
  tongue.classList.add('arrow-line', 'snake-tongue');
  const tongueD = 'M ' + toEdge.x + ' ' + (toEdge.y + 8) +
    ' L ' + toEdge.x + ' ' + (toEdge.y + 16) +
    ' M ' + toEdge.x + ' ' + (toEdge.y + 16) +
    ' L ' + (toEdge.x - 4) + ' ' + (toEdge.y + 20) +
    ' M ' + toEdge.x + ' ' + (toEdge.y + 16) +
    ' L ' + (toEdge.x + 4) + ' ' + (toEdge.y + 20);
  tongue.setAttribute('d', tongueD);
  tongue.setAttribute('stroke', '#ff4d8d');
  tongue.setAttribute('stroke-width', '2');
  tongue.setAttribute('stroke-linecap', 'round');
  tongue.setAttribute('fill', 'none');
  svg.appendChild(tongue);
}

function drawCutePitfall(fromCell, toCell, team) {
  const colors = TEAM_COLORS[team];
  const fromEdge = getEdgePoint(fromCell, toCell, 0.30);
  const toEdge = getEdgePoint(toCell, fromCell, 0.30);
  const svg = document.getElementById('arrowSvg');
  const SVG_NS = 'http://www.w3.org/2000/svg';

  [fromEdge, toEdge].forEach(function(p) {
    const rim = document.createElementNS(SVG_NS, 'ellipse');
    rim.classList.add('arrow-line', 'pit-hole');
    rim.setAttribute('cx', p.x); rim.setAttribute('cy', p.y);
    rim.setAttribute('rx', '34'); rim.setAttribute('ry', '13');
    rim.setAttribute('fill', colors.pitRimDark);
    rim.setAttribute('stroke', colors.pitRim);
    rim.setAttribute('stroke-width', '3');
    svg.appendChild(rim);

    const hole = document.createElementNS(SVG_NS, 'ellipse');
    hole.classList.add('arrow-line', 'pit-hole');
    hole.setAttribute('cx', p.x); hole.setAttribute('cy', p.y);
    hole.setAttribute('rx', '26'); hole.setAttribute('ry', '9');
    hole.setAttribute('fill', 'url(#pitGrad)');
    svg.appendChild(hole);

    const deep = document.createElementNS(SVG_NS, 'ellipse');
    deep.classList.add('arrow-line');
    deep.setAttribute('cx', p.x); deep.setAttribute('cy', p.y);
    deep.setAttribute('rx', '17'); deep.setAttribute('ry', '5');
    deep.setAttribute('fill', '#000');
    svg.appendChild(deep);
  });

  const fallLine = document.createElementNS(SVG_NS, 'line');
  fallLine.classList.add('arrow-line', 'fall-trajectory');
  fallLine.setAttribute('x1', fromEdge.x); fallLine.setAttribute('y1', fromEdge.y + 10);
  fallLine.setAttribute('x2', toEdge.x); fallLine.setAttribute('y2', toEdge.y - 10);
  fallLine.setAttribute('stroke', colors.fallLine);
  fallLine.setAttribute('stroke-width', '4');
  fallLine.setAttribute('stroke-dasharray', '8,7');
  fallLine.setAttribute('stroke-linecap', 'round');
  svg.appendChild(fallLine);
}

  document.getElementById('teamBName').innerHTML = '\u{1F534} ' + escapeHTML(state.teamB.name);

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    return map[c];
  });
}

function updateScores() {
  const aPieces = state.teamA.pieces.reduce(function(s, p) { return s + p; }, 0);
  const bPieces = state.teamB.pieces.reduce(function(s, p) { return s + p; }, 0);
  const aTotal = aPieces + (state.teamA.treasures * 25);
  const bTotal = bPieces + (state.teamB.treasures * 25);
  const aText = state.teamA.pieces.map(function(p, i) { return PIECE_NUMS[i] + p; }).join(' ');
  const bText = state.teamB.pieces.map(function(p, i) { return PIECE_NUMS[i] + p; }).join(' ');
  document.getElementById('teamAPieces').textContent = aText;
  document.getElementById('teamBPieces').textContent = bText;
  document.getElementById('teamAPieceScore').textContent = aPieces;
  document.getElementById('teamBPieceScore').textContent = bPieces;
  document.getElementById('teamATotal').textContent = aTotal;
  document.getElementById('teamBTotal').textContent = bTotal;
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function diceWalk(team, pieceIdx, steps) {
  let currentPos = state['team' + team].pieces[pieceIdx];
  for (let i = 0; i < steps; i++) {
    currentPos = Math.min(currentPos + 1, 25);
    state['team' + team].pieces[pieceIdx] = currentPos;
    renderPieces();
    playSound('sndFootsteps', 0.4);
    const cell = cellElements[currentPos];
    cell.classList.add('highlight');
    await sleep(300);
    cell.classList.remove('highlight');
    if (currentPos === 25) break;
  }
  stopSound('sndFootsteps');
  return currentPos;
}

async function triggerChain(team, pieceIdx, landedCell) {
  const entryCell = landedCell;
  const visitedCells = new Set([landedCell]);
  let currentCell = landedCell;
  let chainCount = 0;
  const maxChain = 12;
  const teamName = state['team' + team].name;

  while (chainCount < maxChain) {
    chainCount++;

    const treasureTeam = getTreasureTeamAt(currentCell);
    if (treasureTeam) {
      state.revealed.treasures.add(currentCell);
      state['team' + team].treasures++;
      const cell = cellElements[currentCell];
      cell.classList.add('treasure-reveal-' + treasureTeam.toLowerCase());
      playSound('sndTreasure');
      showFloatingPoints(team, 25);
      updateTreasureBadge(team, true);
      await showBanner('\u{1F48E} TREASURE! ' + teamName + ' +25 pts', 'treasure-' + treasureTeam.toLowerCase(), 1700);
      cell.classList.remove('treasure-reveal-' + treasureTeam.toLowerCase());
      renderRevealedItems();
      updateScores();
    }

    const snake = findBestSnakeFrom(currentCell);
    const pitfall = findPitfallFrom(currentCell);

    if (snake && pitfall) {
      state.revealed.snakes.add(currentCell);
      state.revealed.pitfalls.add(currentCell);
      const cell = cellElements[currentCell];
      cell.classList.add('conflict-reveal');
      playSound('sndConflict');
      await showBanner('\u2696\uFE0F NEUTRALIZED at ' + currentCell + '!', 'conflict', 2000);
      cell.classList.remove('conflict-reveal');
      renderRevealedItems();
      return;
    }

    if (snake) {
      state.revealed.snakes.add(currentCell);
      playSound('sndSnake');
      await showBanner('\u{1F40D} SNAKE! ' + currentCell + ' \u2191 ' + snake.to, 'snake-' + snake.team.toLowerCase(), 1400);
      renderRevealedItems();
      state['team' + team].pieces[pieceIdx] = snake.to;
      renderPieces();
      cellElements[snake.to].classList.add('highlight');
      await sleep(500);
      cellElements[snake.to].classList.remove('highlight');
      currentCell = snake.to;

      if (visitedCells.has(currentCell)) {
        playSound('sndLoop');
        await showBanner('\u{1F504} LOOP! Back to cell ' + entryCell, 'loop', 2200);
        state['team' + team].pieces[pieceIdx] = entryCell;
        renderPieces();
        cellElements[entryCell].classList.add('highlight');
        await sleep(500);
        cellElements[entryCell].classList.remove('highlight');
        return;
      }
      visitedCells.add(currentCell);
      continue;
    }

    if (pitfall) {
      state.revealed.pitfalls.add(currentCell);
      playSound('sndPitfall');
      await showBanner('\u{1F573}\uFE0F PITFALL! ' + currentCell + ' \u2193 ' + pitfall.to, 'pitfall-' + pitfall.team.toLowerCase(), 1400);
      renderRevealedItems();
      state['team' + team].pieces[pieceIdx] = pitfall.to;
      renderPieces();
      cellElements[pitfall.to].classList.add('highlight');
      await sleep(500);
      cellElements[pitfall.to].classList.remove('highlight');
      currentCell = pitfall.to;

      if (visitedCells.has(currentCell)) {
        playSound('sndLoop');
        await showBanner('\u{1F504} LOOP! Back to cell ' + entryCell, 'loop', 2200);
        state['team' + team].pieces[pieceIdx] = entryCell;
        renderPieces();
        cellElements[entryCell].classList.add('highlight');
        await sleep(500);
        cellElements[entryCell].classList.remove('highlight');
        return;
      }
      visitedCells.add(currentCell);
      continue;
    }

    break;
  }

  if (currentCell === 25) {
    playSound('sndGoal');
    await showBanner('\u{1F3C1} ' + pieceEmoji(team, pieceIdx) + ' reached the GOAL!', 'goal', 1500);
  }
}

function checkAllPiecesAtGoal(team) {
  return state['team' + team].pieces.every(function(p) { return p === 25; });
}

function updateTurn() {
  const aPanel = document.getElementById('teamAPanel');
  const bPanel = document.getElementById('teamBPanel');
  if (state.currentTurn === 'A') {
    if (!state.gameLocked) { aPanel.classList.add('active'); bPanel.classList.remove('active'); }
  } else {
    if (!state.gameLocked) { bPanel.classList.add('active'); aPanel.classList.remove('active'); }
  }
  renderTeamNames();
}

function updatePhase() {
  const welcome = document.getElementById('welcomeSplash');
  const boardWrap = document.getElementById('boardWrapper');
  const score = document.getElementById('scorePanel');
  if (state.phase === 'setup') {
    welcome.classList.remove('hidden');
    boardWrap.classList.add('hidden');
    score.classList.add('hidden');
    document.body.classList.remove('playing');
    document.getElementById('gameOverSplash').classList.remove('show');
  } else {
    welcome.classList.add('hidden');
    boardWrap.classList.remove('hidden');
    score.classList.remove('hidden');
    document.body.classList.add('playing');
  }
  updateGameStatusBadge();
}

renderLegends();
renderTeamNames();
renderPieces();
updateTreasureBadge('A');
updateTreasureBadge('B');
updateTurn();
updatePhase();

const ROOM_ID = 'snake-pitfall-2026-display';
const statusEl = document.getElementById('status');
const peer = new Peer(ROOM_ID, { debug: 2 });
peer.on('open', function() { statusEl.textContent = '\u2705 Ready'; });
peer.on('connection', function(conn) {
  statusEl.textContent = '\u{1F7E2} GM Connected';
  statusEl.className = 'connected';
  conn.on('data', async function(msg) {
    console.log('Received:', msg);
    await handleAction(msg);
  });
  conn.on('close', function() {
    statusEl.textContent = '\u26A0\uFE0F GM disconnected';
    statusEl.className = 'waiting';
  });
});
peer.on('error', function(err) { statusEl.textContent = '\u274C ' + err.type; });

async function handleAction(msg) {
  switch (msg.type) {
    case 'movePiece':
      if (state.gameLocked) return;
      await showDice(msg.dice);
      const landedCell = await diceWalk(msg.team, msg.pieceIdx, msg.dice);
      await sleep(200);
      await triggerChain(msg.team, msg.pieceIdx, landedCell);
      if (checkAllPiecesAtGoal(msg.team)) {
        await showBanner('\u{1F3C6} ' + state['team' + msg.team].name + ' got all 4 pieces to GOAL!', 'winner', 3000);
      }
      break;
    case 'switchTurn':
      if (state.gameLocked) return;
      state.currentTurn = state.currentTurn === 'A' ? 'B' : 'A';
      updateTurn();
      break;
    case 'reset':
      state.teamA = { pieces: [1, 1, 1, 1], treasures: 0, name: state.teamA.name };
      state.teamB = { pieces: [1, 1, 1, 1], treasures: 0, name: state.teamB.name };
      state.currentTurn = 'A';
      state.phase = 'setup';
      state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
      state.gameLocked = false;
      document.getElementById('board').classList.remove('locked');
      document.getElementById('teamAPanel').classList.remove('winner');
      document.getElementById('teamBPanel').classList.remove('winner');
      renderPieces();
      renderRevealedItems();
      updateTreasureBadge('A');
      updateTreasureBadge('B');
      updateTurn();
      updatePhase();
      stopBgMusic();
      break;
    case 'startGame':
      state.phase = 'playing';
      if (msg.items) state.items = msg.items;
      if (msg.teamAName) state.teamA.name = msg.teamAName;
      if (msg.teamBName) state.teamB.name = msg.teamBName;
      state.revealed = { snakes: new Set(), pitfalls: new Set(), treasures: new Set() };
      state.gameLocked = false;
      document.getElementById('board').classList.remove('locked');
      document.getElementById('teamAPanel').classList.remove('winner');
      document.getElementById('teamBPanel').classList.remove('winner');
      updateTreasureBadge('A');
      updateTreasureBadge('B');
      renderRevealedItems();
      renderTeamNames();
      updatePhase();
      playBgMusic();
      break;
    case 'setupMode':
      state.phase = 'setup';
      updatePhase();
      stopBgMusic();
      break;
    case 'updateNames':
      if (msg.teamAName !== undefined) state.teamA.name = msg.teamAName;
      if (msg.teamBName !== undefined) state.teamB.name = msg.teamBName;
      renderTeamNames();
      break;
    case 'endGameNow':
      if (!state.gameLocked) await lockGame();
      stopBgMusic();
      break;
  }
}
