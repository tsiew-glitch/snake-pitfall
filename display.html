<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake & Pitfall — Display</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.3em;
      margin: 8px 0;
      text-shadow: 0 2px 10px rgba(74, 144, 226, 0.5);
    }
    #topBar {
      display: flex;
      gap: 30px;
      align-items: center;
      font-size: 1.2em;
      margin-bottom: 15px;
    }
    #status { padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    .waiting { background: #ff9800; }
    .connected { background: #4caf50; }

    #phaseBanner {
      font-size: 2em;
      padding: 30px 60px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      text-align: center;
      margin: 40px 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    #phaseBanner.hidden { display: none; }

    #board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 5px;
      width: min(65vh, 88vw);
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    #board.hidden { display: none; }
    .cell {
      background: linear-gradient(145deg, #2a3568, #1e2850);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      position: relative;
      transition: background 0.3s;
      overflow: hidden;
      padding: 4px;
    }
    .cell.start { background: linear-gradient(145deg, #2d7a3d, #1f5a2c); }
    .cell.goal { background: linear-gradient(145deg, #d4af37, #b8941f); color: #0a0e27; }
    .cell-number {
      position: absolute;
      top: 3px;
      left: 5px;
      font-size: 0.85em;
      opacity: 0.7;
    }
    .pieces {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      font-size: 1.1em;
      z-index: 3;
      max-width: 100%;
    }
    .piece {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.6em;
      line-height: 1;
    }
    .piece.moving { animation: bounce 0.3s ease; }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2) translateY(-4px); }
    }
    .revealed-items {
      position: absolute;
      bottom: 3px;
      right: 3px;
      font-size: 0.65em;
      display: flex;
      gap: 2px;
      z-index: 1;
    }
    .cell.highlight {
      background: linear-gradient(145deg, #f39c12, #d68910) !important;
      animation: flash 0.4s ease;
    }
    .cell.snake-reveal {
      background: linear-gradient(145deg, #27ae60, #229954) !important;
      animation: revealFlash 0.6s ease;
    }
    .cell.pitfall-reveal {
      background: linear-gradient(145deg, #c0392b, #a93226) !important;
      animation: revealFlash 0.6s ease;
    }
    .cell.treasure-reveal {
      background: linear-gradient(145deg, #d4af37, #f1c40f) !important;
      animation: revealFlash 0.6s ease;
    }
    @keyframes flash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes revealFlash {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); box-shadow: 0 0 30px rgba(255,255,255,0.9); }
      100% { transform: scale(1); }
    }

    #scorePanel {
      display: flex;
      gap: 30px;
      margin-top: 18px;
      font-size: 1.1em;
    }
    #scorePanel.hidden { display: none; }
    .team-score {
      padding: 12px 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      min-width: 280px;
      text-align: center;
      transition: all 0.3s;
    }
    .team-score.active {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }
    .team-score .label { font-size: 1.15em; font-weight: bold; margin-bottom: 6px; }
    .team-score .total { font-size: 1.8em; font-weight: bold; margin-top: 6px; }
    .team-a-color { color: #4a90e2; }
    .team-b-color { color: #e74c3c; }
    .breakdown { font-size: 0.8em; opacity: 0.85; margin: 4px 0; }
    .piece-positions { font-size: 0.85em; }

    #bigBanner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2.6em;
      background: white;
      color: #0a0e27;
      padding: 30px 60px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.4s ease;
      z-index: 200;
      text-align: center;
    }
    #bigBanner.show { transform: translate(-50%, -50%) scale(1); }
    #bigBanner.snake { background: #27ae60; color: white; }
    #bigBanner.pitfall { background: #c0392b; color: white; }
    #bigBanner.treasure { background: #d4af37; color: #1a1f3a; }
    #bigBanner.skip { background: #9b59b6; color: white; }
    #bigBanner.goal { background: #f39c12; color: white; }

    #diceDisplay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 7em;
      background: white;
      color: #0a0e27;
      width: 180px;
      height: 180px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #diceDisplay.show { transform: translate(-50%, -50%) scale(1); }
  </style>
</head>
<body>
  <h1>🎲 Snake & Pitfall</h1>
  <div id="topBar">
    <div>Turn: <span id="turnIndicator" class="team-a-color">🔵 Team A</span></div>
    <div id="status" class="waiting">⏳ Waiting for GM...</div>
  </div>

  <div id="phaseBanner" class="hidden">🤫 Teams are setting up the board...</div>

  <div id="board"></div>

  <div id="scorePanel" class="hidden">
    <div class="team-score active" id="teamAPanel">
      <div class="label team-a-color">🔵 Team A</div>
      <div class="piece-positions" id="teamAPieces">①1 ②1 ③1 ④1</div>
      <div class="breakdown">💎 <span id="teamATreasures">0</span> · Pieces sum: <span id="teamAPieceScore">4</span></div>
      <div class="total">TOTAL: <span id="teamATotal">4</span></div>
    </div>
    <div class="team-score" id="teamBPanel">
      <div class="label team-b-color">🔴 Team B</div>
      <div class="piece-positions" id="teamBPieces">①1 ②1 ③1 ④1</div>
      <div class="breakdown">💎 <span id="teamBTreasures">0</span> · Pieces sum: <span id="teamBPieceScore">4</span></div>
      <div class="total">TOTAL: <span id="teamBTotal">4</span></div>
    </div>
  </div>

  <div id="diceDisplay">🎲</div>
  <div id="bigBanner"></div>

  https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js
  <script>
    // === Game State ===
    // Each team has 4 pieces, each piece has its own position
    const state = {
      phase: 'setup',
      teamA: {
        pieces: [1, 1, 1, 1],  // positions of A1, A2, A3, A4
        treasures: 0,
        skipNext: false
      },
      teamB: {
        pieces: [1, 1, 1, 1],
        treasures: 0,
        skipNext: false
      },
      currentTurn: 'A',
      items: {
        A: { snakes: [], pitfalls: [], treasures: [] },
        B: { snakes: [], pitfalls: [], treasures: [] }
      },
      revealed: {
        snakes: new Set(),
        pitfalls: new Set(),
        treasures: new Set()
      }
    };

    // Piece emoji notation
    const PIECE_NUMS = ['①', '②', '③', '④'];
    function pieceEmoji(team, idx) {
      const color = team === 'A' ? '🔵' : '🔴';
      return color + PIECE_NUMS[idx];
    }

    // === Board Setup ===
    function getCellNumberAt(visualRow, visualCol) {
      const rowFromBottom = 4 - visualRow;
      const rowStart = rowFromBottom * 5 + 1;
      if (rowFromBottom % 2 === 0) return rowStart + visualCol;
      return rowStart + (4 - visualCol);
    }

    const board = document.getElementById('board');
    const cellElements = {};
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cellNum = getCellNumberAt(r, c);
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (cellNum === 1) cell.classList.add('start');
        if (cellNum === 25) cell.classList.add('goal');
        cell.innerHTML = `
          <div class="cell-number">${cellNum}</div>
          <div class="pieces" id="pieces-${cellNum}"></div>
          <div class="revealed-items" id="items-${cellNum}"></div>
        `;
        board.appendChild(cell);
        cellElements[cellNum] = cell;
      }
    }

    function renderPieces() {
      for (let i = 1; i <= 25; i++) {
        document.getElementById(`pieces-${i}`).innerHTML = '';
      }
      // Place all team A pieces
      state.teamA.pieces.forEach((pos, idx) => {
        const slot = document.getElementById(`pieces-${pos}`);
        slot.innerHTML += `<span class="piece" id="pieceA${idx}">${pieceEmoji('A', idx)}</span>`;
      });
      state.teamB.pieces.forEach((pos, idx) => {
        const slot = document.getElementById(`pieces-${pos}`);
        slot.innerHTML += `<span class="piece" id="pieceB${idx}">${pieceEmoji('B', idx)}</span>`;
      });
      updateScores();
    }

    function renderRevealedItems() {
      for (let i = 1; i <= 25; i++) {
        document.getElementById(`items-${i}`).innerHTML = '';
      }
      state.revealed.snakes.forEach(fromCell => {
        const item = findSnakeFrom(fromCell);
        if (item) document.getElementById(`items-${fromCell}`).innerHTML += `<span>🟢↑${item.to}</span>`;
      });
      state.revealed.pitfalls.forEach(fromCell => {
        const item = findPitfallFrom(fromCell);
        if (item) document.getElementById(`items-${fromCell}`).innerHTML += `<span>🔴↓${item.to}</span>`;
      });
    }

    function findSnakeFrom(cellNum) {
      for (const team of ['A', 'B']) {
        const found = state.items[team].snakes.find(s => s.from === cellNum);
        if (found) return found;
      }
      return null;
    }
    function findPitfallFrom(cellNum) {
      for (const team of ['A', 'B']) {
        const found = state.items[team].pitfalls.find(p => p.from === cellNum);
        if (found) return found;
      }
      return null;
    }
    function isTreasureAt(cellNum) {
      if (state.revealed.treasures.has(cellNum)) return false;
      for (const team of ['A', 'B']) {
        if (state.items[team].treasures.includes(cellNum)) return true;
      }
      return false;
    }

    function updateScores() {
      const aPieces = state.teamA.pieces.reduce((s, p) => s + p, 0);
      const bPieces = state.teamB.pieces.reduce((s, p) => s + p, 0);
      const aTotal = aPieces + (state.teamA.treasures * 25);
      const bTotal = bPieces + (state.teamB.treasures * 25);

      const aText = state.teamA.pieces.map((p, i) => `${PIECE_NUMS[i]}${p}`).join(' ');
      const bText = state.teamB.pieces.map((p, i) => `${PIECE_NUMS[i]}${p}`).join(' ');
      document.getElementById('teamAPieces').textContent = aText;
      document.getElementById('teamBPieces').textContent = bText;
      document.getElementById('teamATreasures').textContent = state.teamA.treasures;
      document.getElementById('teamBTreasures').textContent = state.teamB.treasures;
      document.getElementById('teamAPieceScore').textContent = aPieces;
      document.getElementById('teamBPieceScore').textContent = bPieces;
      document.getElementById('teamATotal').textContent = aTotal;
      document.getElementById('teamBTotal').textContent = bTotal;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function showBanner(text, type, duration = 1500) {
      const banner = document.getElementById('bigBanner');
      banner.textContent = text;
      banner.className = type;
      banner.classList.add('show');
      await sleep(duration);
      banner.classList.remove('show');
      await sleep(200);
    }

    async function showDice(value) {
      const diceEl = document.getElementById('diceDisplay');
      const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄'];
      diceEl.textContent = diceFaces[value - 1] || '🎲';
      diceEl.classList.add('show');
      await sleep(1100);
      diceEl.classList.remove('show');
      await sleep(250);
    }

    // === Step-by-step movement for a specific piece ===
    async function diceWalk(team, pieceIdx, steps) {
      let currentPos = state[`team${team}`].pieces[pieceIdx];
      for (let i = 0; i < steps; i++) {
        currentPos = Math.min(currentPos + 1, 25);
        state[`team${team}`].pieces[pieceIdx] = currentPos;
        renderPieces();
        const cell = cellElements[currentPos];
        cell.classList.add('highlight');
        await sleep(300);
        cell.classList.remove('highlight');
        if (currentPos === 25) break;
      }
      return currentPos;
    }

    // === Trigger chain handler ===
    async function triggerChain(team, pieceIdx, landedCell) {
      const visitedCells = new Set([landedCell]);
      let currentCell = landedCell;
      let chainCount = 0;
      const maxChain = 10;

      while (chainCount < maxChain) {
        chainCount++;
        let triggered = false;

        if (isTreasureAt(currentCell)) {
          state.revealed.treasures.add(currentCell);
          state[`team${team}`].treasures++;
          const cell = cellElements[currentCell];
          cell.classList.add('treasure-reveal');
          await showBanner(`💎 TREASURE! Team ${team} +25 pts`, 'treasure', 1500);
          cell.classList.remove('treasure-reveal');
          renderRevealedItems();
          updateScores();
        }

        const snake = findSnakeFrom(currentCell);
        if (snake) {
          state.revealed.snakes.add(currentCell);
          const cell = cellElements[currentCell];
          cell.classList.add('snake-reveal');
          await showBanner(`🟢 SNAKE! ${currentCell} ↑ ${snake.to}`, 'snake', 1400);
          cell.classList.remove('snake-reveal');
          renderRevealedItems();
          state[`team${team}`].pieces[pieceIdx] = snake.to;
          renderPieces();
          cellElements[snake.to].classList.add('highlight');
          await sleep(500);
          cellElements[snake.to].classList.remove('highlight');
          currentCell = snake.to;
          triggered = true;
          if (visitedCells.has(currentCell)) {
            await showBanner(`🔄 LOOP! Team ${team} skips next turn`, 'skip', 2000);
            state[`team${team}`].skipNext = true;
            return;
          }
          visitedCells.add(currentCell);
          continue;
        }

        const pitfall = findPitfallFrom(currentCell);
        if (pitfall) {
          state.revealed.pitfalls.add(currentCell);
          const cell = cellElements[currentCell];
          cell.classList.add('pitfall-reveal');
          await showBanner(`🔴 PITFALL! ${currentCell} ↓ ${pitfall.to}`, 'pitfall', 1400);
          cell.classList.remove('pitfall-reveal');
          renderRevealedItems();
          state[`team${team}`].pieces[pieceIdx] = pitfall.to;
          renderPieces();
          cellElements[pitfall.to].classList.add('highlight');
          await sleep(500);
          cellElements[pitfall.to].classList.remove('highlight');
          currentCell = pitfall.to;
          triggered = true;
          if (visitedCells.has(currentCell)) {
            await showBanner(`🔄 LOOP! Team ${team} skips next turn`, 'skip', 2000);
            state[`team${team}`].skipNext = true;
            return;
          }
          visitedCells.add(currentCell);
          continue;
        }

        if (!triggered) break;
      }

      // Check goal reached for celebration
      if (currentCell === 25) {
        await showBanner(`🏁 ${pieceEmoji(team, pieceIdx)} reached the GOAL!`, 'goal', 1500);
      }
    }

    function updateTurn() {
      const indicator = document.getElementById('turnIndicator');
      const aPanel = document.getElementById('teamAPanel');
      const bPanel = document.getElementById('teamBPanel');
      if (state.currentTurn === 'A') {
        indicator.innerHTML = '🔵 Team A';
        indicator.className = 'team-a-color';
        aPanel.classList.add('active');
        bPanel.classList.remove('active');
      } else {
        indicator.innerHTML = '🔴 Team B';
        indicator.className = 'team-b-color';
        bPanel.classList.add('active');
        aPanel.classList.remove('active');
      }
    }

    function updatePhase() {
      const banner = document.getElementById('phaseBanner');
      const boardEl = document.getElementById('board');
      const score = document.getElementById('scorePanel');
      if (state.phase === 'setup') {
        banner.classList.remove('hidden');
        boardEl.classList.add('hidden');
        score.classList.add('hidden');
      } else {
        banner.classList.add('hidden');
        boardEl.classList.remove('hidden');
        score.classList.remove('hidden');
      }
    }

    renderPieces();
    updateTurn();
    updatePhase();

    // === PeerJS ===
    const ROOM_ID = 'snake-pitfall-2026-display';
    const statusEl = document.getElementById('status');
    const peer = new Peer(ROOM_ID, { debug: 2 });

    peer.on('open', () => {
      statusEl.textContent = '✅ Ready — waiting for GM';
    });

    peer.on('connection', (conn) => {
      statusEl.textContent = '🟢 GM Connected';
      statusEl.className = 'connected';

      conn.on('data', async (msg) => {
        console.log('Received:', msg);
        await handleAction(msg);
      });

      conn.on('close', () => {
        statusEl.textContent = '⚠️ GM disconnected';
        statusEl.className = 'waiting';
      });
    });

    peer.on('error', (err) => {
      statusEl.textContent = '❌ ' + err.type;
    });

    async function handleAction(msg) {
      switch (msg.type) {
        case 'movePiece':
          // msg = { type, team, pieceIdx, dice }
          await showDice(msg.dice);
          if (state[`team${msg.team}`].skipNext) {
            await showBanner(`⏭️ Team ${msg.team} skips this turn!`, 'skip', 1800);
            state[`team${msg.team}`].skipNext = false;
            renderPieces();
            return;
          }
          const landedCell = await diceWalk(msg.team, msg.pieceIdx, msg.dice);
          await sleep(200);
          await triggerChain(msg.team, msg.pieceIdx, landedCell);
          break;
        case 'switchTurn':
          state.currentTurn = state.currentTurn === 'A' ? 'B' : 'A';
          updateTurn();
          break;
        case 'reset':
          state.teamA = { pieces: [1, 1, 1, 1], treasures: 0, skipNext: false };
          state.teamB = { pieces: [1, 1, 1, 1], treasures: 0, skipNext: false };
          state.currentTurn = 'A';
          state.phase = 'setup';
          state.revealed = {
            snakes: new Set(),
            pitfalls: new Set(),
            treasures: new Set()
          };
          renderPieces();
          renderRevealedItems();
          updateTurn();
          updatePhase();
          break;
        case 'startGame':
          state.phase = 'playing';
          if (msg.items) state.items = msg.items;
          state.revealed = {
            snakes: new Set(),
            pitfalls: new Set(),
            treasures: new Set()
          };
          renderRevealedItems();
          updatePhase();
          break;
        case 'setupMode':
          state.phase = 'setup';
          updatePhase();
          break;
      }
    }
  </script>
</body>
</html>
