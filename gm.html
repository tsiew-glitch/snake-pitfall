<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Snake & Pitfall — GM Panel</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1f3a;
      color: white;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    h1 {
      text-align: center;
      margin: 10px 0;
    }
    #status {
      text-align: center;
      font-size: 1.2em;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: bold;
    }
    .waiting { background: #ff9800; }
    .connected { background: #4caf50; }
    .error { background: #f44336; }

    .panel {
      background: rgba(255, 255, 255, 0.08);
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
    }
    .panel h2 {
      text-align: center;
      margin-top: 0;
    }
    button {
      font-size: 1.3em;
      padding: 18px 24px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      background: #4a90e2;
      color: white;
      cursor: pointer;
      min-width: 140px;
      min-height: 60px; /* iPad touch-friendly */
      font-weight: 600;
      transition: transform 0.1s, background 0.2s;
    }
    button:active {
      background: #357abd;
      transform: scale(0.96);
    }
    button.danger {
      background: #e74c3c;
    }
    button.danger:active {
      background: #c0392b;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hint {
      text-align: center;
      opacity: 0.7;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <h1>🎮 GM Panel</h1>
  <div id="status" class="waiting">⏳ Connecting to display...</div>

  <div class="panel">
    <h2>🧪 Test Buttons</h2>
    <div class="row">
      <button onclick="sendTest('Hello from iPad!')">👋 Say Hello</button>
      <button onclick="sendTest('🎲 Dice rolled: 4')">🎲 Test Dice</button>
      <button onclick="sendTest('🪜 Ladder placed 5→14')">🪜 Test Ladder</button>
      <button onclick="sendTest('🐍 Snake placed 19→6')">🐍 Test Snake</button>
      <button class="danger" onclick="sendTest('🔄 RESET')">🔄 Reset</button>
    </div>
  </div>

  <div class="panel">
    <p class="hint">Tap a button above → check the Display screen 👀</p>
  </div>

  <!-- PeerJS library -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    const DISPLAY_ID = 'snake-pitfall-2026-display';
    const statusEl = document.getElementById('status');
    let conn = null;

    const peer = new Peer({ debug: 2 });

    peer.on('open', (id) => {
      console.log('GM peer ready, my ID:', id);
      connectToDisplay();
    });

    function connectToDisplay() {
      statusEl.textContent = '🔄 Connecting to Display...';
      statusEl.className = 'waiting';

      conn = peer.connect(DISPLAY_ID, { reliable: true });

      conn.on('open', () => {
        statusEl.textContent = '🟢 Connected to Display';
        statusEl.className = 'connected';
      });

      conn.on('close', () => {
        statusEl.textContent = '⚠️ Disconnected — refresh to reconnect';
        statusEl.className = 'waiting';
      });

      conn.on('error', (err) => {
        console.error('Connection error:', err);
        statusEl.textContent = '❌ Connection error';
        statusEl.className = 'error';
      });
    }

    peer.on('error', (err) => {
      console.error('Peer error:', err);
      statusEl.textContent = '❌ Error: ' + err.type + ' (open display.html first!)';
      statusEl.className = 'error';
    });

    function sendTest(message) {
      if (conn && conn.open) {
        conn.send({
          type: 'test',
          message: message,
          time: Date.now()
        });
        // Quick visual feedback (haptic-like on iPad)
        if (navigator.vibrate) navigator.vibrate(30);
      } else {
        alert('Not connected yet! Make sure display.html is open on the PC first, then refresh this page.');
      }
    }
  </script>
</body>
</html>
